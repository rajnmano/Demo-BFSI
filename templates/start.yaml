# =============================================================================
# METADATA
# =============================================================================
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: 'Required Configuration'
        Parameters:
          - AssetsBucketName
      - Label:
          default: 'Existing Infrastructure'
        Parameters:
          - ExistingConnectInstanceArn
          - ExistingConnectInstanceId
          - ExistingConnectInstanceAlias
          - ExistingAssistantArn
          - ExistingAssistantId
      - Label:
          default: 'Template URLs'
        Parameters:
          - ConnectInstanceStackUrl
          - AssistantSetupStackUrl
          - AssistantLoggingStackUrl
          - InstanceAttributesStackUrl
          - AssistantKnowledgeBaseStackUrl
          - AIAgentsStackUrl
          - KnowledgeBaseZipUrl
          - DemoApiStackUrl
          - AgentCoreGatewayStackUrl
    ParameterLabels:
      AssetsBucketName:
        default: 'Assets S3 Bucket Name'
      ExistingConnectInstanceArn:
        default: 'Existing Connect Instance ARN'
      ExistingConnectInstanceId:
        default: 'Existing Connect Instance ID'
      ExistingConnectInstanceAlias:
        default: 'Existing Connect Instance Alias'
      ExistingAssistantArn:
        default: 'Existing Assistant ARN'
      ExistingAssistantId:
        default: 'Existing Assistant ID'
      ConnectInstanceStackUrl:
        default: 'Connect Instance Template URL'
      AssistantSetupStackUrl:
        default: 'Assistant Setup Template URL'
      AssistantLoggingStackUrl:
        default: 'Assistant Logging Template URL'
      InstanceAttributesStackUrl:
        default: 'Instance Attributes Template URL'
      AssistantKnowledgeBaseStackUrl:
        default: 'Knowledge Base Template URL'
      AIAgentsStackUrl:
        default: 'AI Agents Template URL'
      KnowledgeBaseZipUrl:
        default: 'Knowledge Base Documents ZIP URL'
      DemoApiStackUrl:
        default: 'demo API Template URL'

# =============================================================================
# PARAMETERS
# =============================================================================
Parameters:
  AssetsBucketName:
    Type: String
    Default: 'my-demo-portal-billing'
    Description: >-
      Name of the S3 bucket containing deployment assets. REQUIRED.
      
      BEFORE DEPLOYING: Create an S3 bucket and upload the following structure:
      - templates/ folder with all CloudFormation templates (.yaml files)
      - demo/ folders with:
        - demo-api-openapi.yaml
        - demo-seed-data.json
      - ai-agents/demo/ folders with prompt YAML files
      - knowledge-base/ folder with KB ZIP files
      
      HOW TO FIND: If you already have a bucket, go to S3 Console > Buckets and copy the bucket name (not the ARN).
      
      Example: my-workshop-assets-bucket

  # ---------------------------------------------------------------------------
  # Existing Infrastructure Parameters (Customer Mode)
  # ---------------------------------------------------------------------------
  # These parameters allow customers to use their existing Connect and Assistant
  # resources instead of creating new ones. Leave empty to create new resources.
  
  ExistingConnectInstanceArn:
    Type: String
    Default: 'arn:aws:connect:us-east-1:612492339331:instance/ddfa4c00-1312-484f-ba1f-eda4ed751193'
    Description: >-
      ARN of an existing Amazon Connect instance. OPTIONAL - leave blank to create a new instance.
      
      WHEN TO USE: If you already have an Amazon Connect instance and want to add the AI Assistant to it.
      
      IF LEFT BLANK: A new Amazon Connect instance will be created with a generated alias.
      
      HOW TO FIND: Amazon Connect Console > Your instance > Click instance name > Copy the Instance ARN from the Overview page.
      
      FORMAT: arn:aws:connect:{region}:{account-id}:instance/{instance-id}
      
      IMPORTANT: If you provide this, you MUST also provide ExistingConnectInstanceId.

  ExistingConnectInstanceId:
    Type: String
    Default: 'ddfa4c00-1312-484f-ba1f-eda4ed751193'
    Description: >-
      ID of an existing Amazon Connect instance. REQUIRED if ExistingConnectInstanceArn is provided.
      
      HOW TO FIND: This is the last segment of the Instance ARN after 'instance/'.
      Example: If ARN is arn:aws:connect:us-east-1:123456789012:instance/abc-123-def-456
      Then the ID is: abc-123-def-456
      
      IF LEFT BLANK: Only valid if ExistingConnectInstanceArn is also blank (new instance will be created).

  ExistingConnectInstanceAlias:
    Type: String
    Default: 'amazon-connect-612492339331-0e5675314c71'
    Description: >-
      Alias (subdomain) of an existing Amazon Connect instance. REQUIRED if ExistingConnectInstanceArn is provided.
      
      HOW TO FIND: This is the subdomain part of your Connect admin URL.
      Example: If your Connect URL is https://my-contact-center.my.connect.aws/
      Then the alias is: my-contact-center
      
      You can also find it in Amazon Connect Console > Your instance > Overview > Instance alias.
      
      IMPORTANT: This is NOT the instance ID. The alias is a human-readable name like 'my-contact-center',
      while the ID is a UUID like 'abc-123-def-456'.
      
      IF LEFT BLANK: Only valid if ExistingConnectInstanceArn is also blank (new instance will be created).

  ExistingAssistantArn:
    Type: String
    Default: 'arn:aws:wisdom:us-east-1:612492339331:assistant/1a19ec18-5728-40bd-bdc9-a4df616817ad'
    Description: >-
      ARN of an existing Amazon Q in Connect (Wisdom) Assistant. OPTIONAL - leave blank to create a new assistant.
      
      WHEN TO USE: If you already have an Amazon Q in Connect assistant configured and want to reuse it.
      
      IF LEFT BLANK: A new Amazon Q in Connect assistant will be created and associated with the Connect instance.
      
      HOW TO FIND: Amazon Connect Console > Your instance > Amazon Q > Copy the Assistant ARN.
      
      FORMAT: arn:aws:wisdom:{region}:{account-id}:assistant/{assistant-id}
      
      IMPORTANT: If you provide this, you MUST also provide ExistingAssistantId.

  ExistingAssistantId:
    Type: String
    Default: '1a19ec18-5728-40bd-bdc9-a4df616817ad'
    Description: >-
      ID of an existing Amazon Q in Connect Assistant. REQUIRED if ExistingAssistantArn is provided.
      
      HOW TO FIND: This is the last segment of the Assistant ARN after 'assistant/'.
      Example: If ARN is arn:aws:wisdom:us-east-1:123456789012:assistant/xyz-789-abc-012
      Then the ID is: xyz-789-abc-012
      
      IF LEFT BLANK: Only valid if ExistingAssistantArn is also blank (new assistant will be created).

  AssistantKnowledgeBaseStackUrl:
    Type: String
    Default: 'https://my-demo-portal-billing.s3.us-east-1.amazonaws.com/templates/assistant-knowledge-base.yaml'
    Description: >-
      S3 URL for the assistant-knowledge-base.yaml nested stack template.
      
      FORMAT: https://{bucket-name}.s3.{region}.amazonaws.com/templates/assistant-knowledge-base.yaml
      
      EXAMPLE: https://my-demo-portal-billing.s3.us-east-1.amazonaws.com/templates/assistant-knowledge-base.yaml
      
      HOW TO CONSTRUCT:
      1. Go to S3 Console > Your assets bucket > templates folder
      2. Click on assistant-knowledge-base.yaml
      3. Copy the Object URL (not the S3 URI)
      
      REQUIRED: Yes, when CreateKnowledgeBase is set to 'true'.

  DemoApiStackUrl:
    Type: String
    Default: 'https://my-demo-portal-billing.s3.us-east-1.amazonaws.com/templates/demo-api.yaml'
    Description: >-
      S3 URL for the demo-api.yaml nested stack template.
      
      FORMAT: https://{bucket-name}.s3.{region}.amazonaws.com/templates/demo-api.yaml
      
      EXAMPLE: https://my-demo-portal-billing.s3.us-east-1.amazonaws.com/templates/demo-api.yaml
      
      HOW TO CONSTRUCT:
      1. Go to S3 Console > Your assets bucket > templates folder
      2. Click on demo-api.yaml
      3. Copy the Object URL (not the S3 URI)
      
      REQUIRED: Yes, when IndustryMode is 'all' or 'demo'.


  AgentCoreGatewayStackUrl:
    Type: String
    Default: 'https://my-demo-portal-billing.s3.us-east-1.amazonaws.com/templates/agentcore-gateway.yaml'
    Description: >-
      S3 URL for the agentcore-gateway.yaml nested stack template.
      
      FORMAT: https://{bucket-name}.s3.{region}.amazonaws.com/templates/agentcore-gateway.yaml
      
      EXAMPLE: https://my-demo-portal-billing.s3.us-east-1.amazonaws.com/templates/agentcore-gateway.yaml
      
      HOW TO CONSTRUCT:
      1. Go to S3 Console > Your assets bucket > templates folder
      2. Click on agentcore-gateway.yaml
      3. Copy the Object URL (not the S3 URI)
      
      REQUIRED: Yes, when CreateAgentCoreGateway is set to 'true'.

  AIAgentsStackUrl:
    Type: String
    Default: 'https://my-demo-portal-billing.s3.us-east-1.amazonaws.com/templates/ai-agents-setup.yaml'
    Description: >-
      S3 URL for the ai-agents-setup.yaml nested stack template.
      
      FORMAT: https://{bucket-name}.s3.{region}.amazonaws.com/templates/ai-agents-setup.yaml
      
      EXAMPLE: https://my-demo-portal-billing.s3.us-east-1.amazonaws.com/templates/ai-agents-setup.yaml
      
      HOW TO CONSTRUCT:
      1. Go to S3 Console > Your assets bucket > templates folder
      2. Click on ai-agents-setup.yaml
      3. Copy the Object URL (not the S3 URI)
      
      REQUIRED: Yes, when CreateAIAgents is set to 'true'.

  Boto3LayerArn:
    Type: String
    Default: ''
    Description: >-
      ARN of a pre-existing Lambda Layer containing an updated boto3 version.
      Use this for BYO account deployments where you've already created the layer.
      
      If not provided, the template will create a layer from Boto3LayerS3Bucket/Key.
      
      HOW TO CREATE MANUALLY:
      1. Run: scripts/build-boto3-layer.ps1 (creates boto3-layer.zip)
      2. Upload boto3-layer.zip to S3
      3. Create Lambda layer: aws lambda publish-layer-version --layer-name boto3-latest --content S3Bucket=YOUR-BUCKET,S3Key=layers/boto3-layer.zip --compatible-runtimes python3.13
      4. Copy the LayerVersionArn from the output
      
      FORMAT: arn:aws:lambda:{region}:{account}:layer:{layer-name}:{version}
      EXAMPLE: arn:aws:lambda:us-east-1:123456789012:layer:boto3-latest:1

  Boto3LayerS3Bucket:
    Type: String
    Default: 'my-demo-portal-billing'
    Description: >-
      S3 bucket containing the boto3-layer.zip file for creating a Lambda Layer.
      Use this for Workshop Studio deployments where the layer needs to be created.
      
      For Workshop Studio: Use the ASU bucket (e.g., ws-assets-prod-iad-r-pdx-f3b3f9f1a7d6a3d0)
      For BYO accounts: Use your assets bucket name.
      
      If Boto3LayerArn is provided, this parameter is ignored.

  Boto3LayerS3Key:
    Type: String
    Default: 'boto3-layer/boto3-layer.zip'
    Description: >-
      S3 key (path) to the boto3-layer.zip file within the bucket.
      
      For Workshop Studio: Use the workshop ID prefix (e.g., 9657f1e6-9357-4d9f-8733-d334ebec0aab/boto3-layer.zip)
      For BYO accounts: Use the path where you uploaded the ZIP.
      
      If Boto3LayerArn is provided, this parameter is ignored.

  KnowledgeBaseZipUrl:
    Type: String
    Default: 'https://my-demo-portal-billing.s3.us-east-1.amazonaws.com/knowledge-base/demo-kb.zip'
    Description: >-
      S3 URL for the knowledge base documents ZIP file.
      
      FORMAT: https://{bucket-name}.s3.{region}.amazonaws.com/knowledge-base/{industry}-kb.zip
      
      EXAMPLES:
      - https://my-demo-portal-billing.s3.us-east-1.amazonaws.com/knowledge-base/demo-kb.zip
      
      HOW TO CONSTRUCT:
      1. Go to S3 Console > Your assets bucket > knowledge-base folder
      2. Click on the appropriate ZIP file for your IndustryMode selection
      3. Copy the Object URL (not the S3 URI)
      
      REQUIRED: Yes, when CreateKnowledgeBase is set to 'true'.
      
      NOTE: Use the ZIP file matching your IndustryMode - use 'all-industries-kb.zip' for IndustryMode='all', or '{industry}-kb.zip' for single industry deployments.

  # ===========================================================================
  # INDUSTRY ASSET URLs (Seed Data and OpenAPI Specs)
  # ===========================================================================
  # These URLs point to the seed data JSON files and OpenAPI specification YAML files
  # for each industry. Use Asset Static URLs (ASUs) for Workshop Studio deployments.

  # demo Industry Assets
  DemoSeedDataUrl:
    Type: String
    Default: 's3://my-demo-portal-billing/demo/demo-seed-data.json'
    Description: 'URL for demo seed data JSON file'

  DemoOpenApiSpecUrl:
    Type: String
    Default: 's3://my-demo-portal-billing/demo/demo-api-openapi.yaml'
    Description: 'URL for demo API OpenAPI specification YAML file'


  # ===========================================================================
  # AI AGENT PROMPT URLs
  # ===========================================================================
  # These URLs point to the AI agent prompt YAML files for each industry.
  # Use Asset Static URLs (ASUs) for Workshop Studio deployments.


  # demo AI Agent Prompts
  DemoSelfServicePromptUrl:
    Type: String
    Default: 's3://my-demo-portal-billing/ai-agents/demo/demo-self-service-prompt.yaml'
    Description: 'URL for demo self-service AI agent prompt YAML file'

  DemoAgentAssistPromptUrl:
    Type: String
    Default: 's3://my-demo-portal-billing/ai-agents/demo/demo-agent-assist-prompt.yaml'
    Description: 'URL for demo agent-assist AI agent prompt YAML file'
    
# =============================================================================
# CONDITIONS
# =============================================================================
#Conditions:

    
Resources:
  # ---------------------------------------------------------------------------
  # Shared API Key (Optional - Default: true)
  # ---------------------------------------------------------------------------
  # When enabled, creates a single shared API key that all industry APIs use.
  # This simplifies AgentCore Gateway configuration - one identity for all APIs.
  # When disabled, each industry module creates its own API key.
  # NOTE: API Gateway limits each API key to 10 usage plans, so we create two
  # shared keys to support all 11 industries.
  
  SharedApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: !Sub '${AWS::StackName}-shared-api-key'
      Description: 'Shared API key for industry APIs (1-10)'
      Enabled: true
      Tags:
        - Key: Purpose
          Value: Shared API Authentication
  # Custom Resource Lambda Role for API Key Retrieval
  SharedApiKeyRetrievalRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ApiGatewayAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - apigateway:GET
                Resource: !Sub 'arn:aws:apigateway:${AWS::Region}::/apikeys/*'
  # Custom Resource Lambda for Shared API Key Retrieval
  SharedApiKeyFn:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-SharedApiKeyRetrieval'
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt SharedApiKeyRetrievalRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import json
          import boto3
          import urllib3
          import logging
          
          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          
          http = urllib3.PoolManager()
          apigateway = boto3.client('apigateway')
          
          def send_response(event, context, status, data=None, physical_resource_id=None, reason=None):
              response_body = {
                  'Status': status,
                  'Reason': reason or f'See CloudWatch Log Stream: {context.log_stream_name}',
                  'PhysicalResourceId': physical_resource_id or context.log_stream_name,
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': data or {}
              }
              
              logger.info(f'Response body: {json.dumps(response_body)}')
              
              try:
                  response = http.request(
                      'PUT',
                      event['ResponseURL'],
                      body=json.dumps(response_body).encode('utf-8'),
                      headers={'Content-Type': ''}
                  )
                  logger.info(f'CloudFormation response status: {response.status}')
              except Exception as e:
                  logger.error(f'Error sending response: {str(e)}')
                  raise
          
          def handler(event, context):
              logger.info(f'Event: {json.dumps(event)}')
              
              try:
                  request_type = event['RequestType']
                  
                  if request_type == 'Delete':
                      logger.info('Delete request - no action needed')
                      send_response(event, context, 'SUCCESS', {})
                      return
                  
                  api_key_id = event['ResourceProperties']['ApiKeyId']
                  logger.info(f'Retrieving API key value for: {api_key_id}')
                  
                  response = apigateway.get_api_key(
                      apiKey=api_key_id,
                      includeValue=True
                  )
                  
                  api_key_value = response['value']
                  logger.info('Successfully retrieved API key value')
                  
                  send_response(
                      event, 
                      context, 
                      'SUCCESS', 
                      data={'ApiKeyValue': api_key_value},
                      physical_resource_id=api_key_id
                  )
                  
              except Exception as e:
                  logger.error(f'Error retrieving API key: {str(e)}')
                  send_response(event, context, 'FAILED', reason=str(e))

  # Custom Resource for Shared API Key Value Retrieval
  SharedApiKeyValueRetrieval:
    Type: Custom::ApiKeyValueRetrieval
    DependsOn: SharedApiKey
    Properties:
      ServiceToken: !GetAtt SharedApiKeyFn.Arn
      ApiKeyId: !Ref SharedApiKey

  # ===========================================================================
  # SHARED INFRASTRUCTURE NESTED STACKS (Always Deployed)
  # ===========================================================================
  # They provide the core Amazon Connect and AI Assistant infrastructure.
  # These can be skipped if existing resources are provided via parameters.
   # ---------------------------------------------------------------------------
  # Knowledge Base Stack
  # ---------------------------------------------------------------------------
  # Creates the knowledge base with FAQ documents and associates it
  # with the Connect Assistant. Depends on AssistantStack.
  # Can be skipped by setting CreateKnowledgeBase=false.
  KnowledgeBaseStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Ref AssistantKnowledgeBaseStackUrl
      Parameters:
        KnowledgeBaseZipUrl: !Ref KnowledgeBaseZipUrl
        AssistantArn: !Ref ExistingAssistantArn
        ConnectInstanceId: !Ref ExistingConnectInstanceId
        WorkshopStackName: !Ref AWS::StackName
      Tags:
        - Key: Purpose
          Value: Assistant Knowledge Base
  # ---------------------------------------------------------------------------
  # Demo API Stack
  # ---------------------------------------------------------------------------
  # Provides Demo and payment management APIs including transactions,
  # invoices, refunds, and dispute handling.
  DemoApiStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Ref DemoApiStackUrl
      Parameters:
        SeedDataUrl: !Ref DemoSeedDataUrl
        OpenApiSpecUrl: !Ref DemoOpenApiSpecUrl
        SharedApiKeyId: !Ref SharedApiKey
      Tags:
        - Key: Purpose
          Value: Demo System API
        - Key: Industry
          Value: Demo
   # ===========================================================================
  # AI AGENTS NESTED STACK (Conditional)
  # ===========================================================================
  # Creates AI Prompts and AI Agents for the selected industries.
  # Depends on Assistant and Knowledge Base stacks for required IDs.
  # Deployed when CreateAIAgents=true and Knowledge Base is created.

  AIAgentsStack:
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - KnowledgeBaseStack
    Properties:
      TemplateURL: !Ref AIAgentsStackUrl
      Parameters:
        AssistantId: !Ref ExistingAssistantId
        ConnectInstanceId: !Ref ExistingConnectInstanceId
        AssistantAssociationId: !GetAtt KnowledgeBaseStack.Outputs.AssistantAssociationId
        IndustryMode: 'demo'
        # Boto3 Layer - either pre-existing ARN or S3 bucket/key to create one
        Boto3LayerArn: !Ref Boto3LayerArn
        Boto3LayerS3Bucket: !Ref Boto3LayerS3Bucket
        Boto3LayerS3Key: !Ref Boto3LayerS3Key
        # For BYO account mode - S3 bucket containing prompt files (empty for Workshop Studio)
        AssetsBucketName: !Ref AssetsBucketName
        # AI Agent Prompt URLs (HTTPS ASUs for Workshop Studio, or S3 keys for BYO)
        DemoSelfServicePromptUrl: !Ref DemoSelfServicePromptUrl
        DemoAgentAssistPromptUrl: !Ref DemoAgentAssistPromptUrl
        
      Tags:
        - Key: Purpose
          Value: AI Agents and Prompts

  # ===========================================================================
  # AGENTCORE GATEWAY NESTED STACK (Conditional)
  # ===========================================================================
  # Creates an Amazon Bedrock AgentCore Gateway with Gateway Targets for each
  # deployed industry API. This enables AI Agents to call industry APIs through
  # the Model Context Protocol (MCP).
  # Deployed when CreateAgentCoreGateway=true and shared API keys are created.

  AgentCoreGatewayStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Ref AgentCoreGatewayStackUrl
      Parameters:
        IndustryMode: 'demo'
        SharedApiKeyValue1: !GetAtt SharedApiKeyValueRetrieval.ApiKeyValue
        SharedApiKeyValue2: !GetAtt SharedApiKeyValueRetrieval.ApiKeyValue
        AgentCoreGatewayDiscoveryUrl: !Sub 'https://${ExistingConnectInstanceAlias}.my.connect.aws/.well-known/openid-configuration'
        Boto3LayerArn: !Ref Boto3LayerArn
      Tags:
        - Key: Purpose
          Value: AgentCore Gateway for MCP Tool Integration

# =============================================================================
Outputs:
  # ---------------------------------------------------------------------------
  # Assets Bucket
  # ---------------------------------------------------------------------------
  AssetsBucketName:
    Description: 'The S3 bucket used for assets'
    Value: !Ref AssetsBucketName
    Export:
      Name: !Sub '${AWS::StackName}-AssetsBucket'

  AssetsBucketArn:
    Description: 'ARN of the assets S3 bucket'
    Value: !Sub 'arn:aws:s3:::${AssetsBucketName}'
    Export:
      Name: !Sub '${AWS::StackName}-AssetsBucketArn'
  # ---------------------------------------------------------------------------
  # Shared API Key Output (when CreateSharedApiKey=true)
  # ---------------------------------------------------------------------------
  # Two API keys are used due to API Gateway's limit of 10 usage plans per key.
  # SharedApiKey is used for industries 1-10, SharedApiKey2 for overflow (11+).
  SharedApiKeyValue:
    Description: 'Shared API key value for industry APIs (1-10). Use for AgentCore Gateway configuration.'
    Value: !GetAtt SharedApiKeyValueRetrieval.ApiKeyValue
    Export:
      Name: !Sub '${AWS::StackName}-SharedApiKey'

  SharedApiKeyId:
    Description: 'ID of the shared API key (1-10)'
    Value: !Ref SharedApiKey
    Export:
      Name: !Sub '${AWS::StackName}-SharedApiKeyId'

# Knowledge Base Outputs (only when knowledge base is created)
  KnowledgeBaseBucketName:
    Description: 'S3 bucket containing knowledge base documents (only when KB created)'
    Value: !GetAtt KnowledgeBaseStack.Outputs.KnowledgeBaseBucketName
    Export:
      Name: !Sub '${AWS::StackName}-KnowledgeBaseBucketName'

  KnowledgeBaseId:
    Description: 'ID of the Connect Assistant Knowledge Base (only when KB created)'
    Value: !GetAtt KnowledgeBaseStack.Outputs.KnowledgeBaseId
    Export:
      Name: !Sub '${AWS::StackName}-KnowledgeBaseId'

  KnowledgeBaseArn:
    Description: 'ARN of the Connect Assistant Knowledge Base (only when KB created)'
    Value: !GetAtt KnowledgeBaseStack.Outputs.KnowledgeBaseArn
    Export:
      Name: !Sub '${AWS::StackName}-KnowledgeBaseArn'

  DemoApiUrl:
    Description: 'URL of the Demo System API'
    Value: !GetAtt DemoApiStack.Outputs.ApiUrl
    Export:
      Name: !Sub '${AWS::StackName}-DemoApiUrl'

  DemoOpenApiSpecS3Location:
    Description: 'S3 location of Demo API OpenAPI specification'
    Value: !GetAtt DemoApiStack.Outputs.OpenApiSpecS3Location
    Export:
      Name: !Sub '${AWS::StackName}-DemoOpenApiSpecS3Location'