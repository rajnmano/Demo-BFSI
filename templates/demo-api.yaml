  RefundFn:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.13
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      TracingConfig:
        Mode: Active
      LoggingConfig:
        LogGroup: !Ref LambdaLogGroup
      Environment:
        Variables:
          REFUNDS_TABLE: !Ref RefundsTable
          TRANSACTIONS_TABLE: !Ref TransactionsTable
      Code:
        ZipFile: |
          import json
          import os
          import boto3
          import uuid
          from datetime import datetime, timedelta

          dynamodb = boto3.resource('dynamodb')
          refunds_table = dynamodb.Table(os.environ['REFUNDS_TABLE'])
          transactions_table = dynamodb.Table(os.environ['TRANSACTIONS_TABLE'])

          def lambda_handler(event, context):
              print(f"Event: {json.dumps(event)}")
              
              try:
                  body = json.loads(event.get('body', '{}'))
                  
                  transaction_id = body.get('transactionId')
                  amount = body.get('amount')
                  reason = body.get('reason')
                  expedite = body.get('expedite', False)
                  
                  if not transaction_id or amount is None or not reason:
                      return response(400, {
                          'error': 'Missing required parameters',
                          'code': 'MISSING_PARAMETERS',
                          'details': 'transactionId, amount, and reason are required'
                      })
                  
                  # Get original transaction
                  txn_result = transactions_table.get_item(Key={'transactionId': transaction_id})
                  txn = txn_result.get('Item')
                  
                  if not txn:
                      return response(404, {
                          'error': 'Transaction not found',
                          'code': 'TRANSACTION_NOT_FOUND',
                          'details': f'No transaction found with ID {transaction_id}'
                      })
                  
                  # Validate amount
                  if amount > float(txn.get('amount', 0)):
                      return response(400, {
                          'error': 'Invalid refund amount',
                          'code': 'INVALID_REFUND_AMOUNT',
                          'details': f'Refund amount cannot exceed original transaction amount of {txn.get("amount")}'
                      })
                  
                  # Create refund
                  refund_id = f'REF-{datetime.now().strftime("%Y")}-{str(uuid.uuid4())[:8].upper()}'
                  now = datetime.utcnow()
                  days_to_complete = 5 if expedite else 10
                  estimated_completion = (now + timedelta(days=days_to_complete)).strftime('%Y-%m-%d')
                  
                  refund = {
                      'refundId': refund_id,
                      'transactionId': transaction_id,
                      'amount': amount,
                      'currency': txn.get('currency', 'USD'),
                      'status': 'Pending',
                      'reason': reason,
                      'expedited': expedite,
                      'createdAt': now.isoformat() + 'Z',
                      'estimatedCompletionDate': estimated_completion,
                      'paymentMethodType': txn.get('paymentMethodType', 'Unknown'),
                      'paymentMethodLast4': txn.get('paymentMethodLast4', '****')
                  }
                  
                  refunds_table.put_item(Item=refund)
                  
                  return response(201, {'refund': refund})
                  
              except json.JSONDecodeError:
                  return response(400, {'error': 'Invalid JSON body', 'code': 'INVALID_JSON'})
              except Exception as e:
                  print(f"Error: {str(e)}")
                  return response(500, {'error': 'Internal server error', 'details': str(e)})

          def response(status_code, body):
              return {
                  'statusCode': status_code,
                  'headers': {
                      'Content-Type': 'application/json',
                      'Access-Control-Allow-Origin': '*'
                  },
                  'body': json.dumps(body, default=str)
              }
    DeletionPolicy: Delete

