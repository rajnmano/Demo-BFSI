      AccessLogSetting:
        DestinationArn: !GetAtt ApiLogGroup.Arn
        Format: '{"requestId":"$context.requestId","ip":"$context.identity.sourceIp","caller":"$context.identity.caller","user":"$context.identity.user","requestTime":"$context.requestTime","httpMethod":"$context.httpMethod","resourcePath":"$context.resourcePath","status":"$context.status","protocol":"$context.protocol","responseLength":"$context.responseLength","integrationError":"$context.integrationErrorMessage"}'

  # ============================================================================
  # API KEY AND USAGE PLAN
  # ============================================================================
  
  # API Key (only created when not using shared key)
  BankingApiKey:
    Type: AWS::ApiGateway::ApiKey
    Condition: CreateOwnApiKey
    DependsOn: ApiStage
    Properties:
      Name: !Sub '${AWS::StackName}-api-key'
      Description: 'API Key for Banking System API v2'
      Enabled: true
      GenerateDistinctId: true

  BankingUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn: ApiStage
    Properties:
      UsagePlanName: !Sub '${AWS::StackName}-usage-plan'
      Description: 'Usage plan for Banking System API v2'
      ApiStages:
        - ApiId: !Ref BankingApi
          Stage: prod
      Throttle:
        BurstLimit: 100
        RateLimit: 50

  # Usage Plan Key - associates the effective API key with the usage plan
  BankingUsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !If [UseSharedApiKey, !Ref SharedApiKeyId, !Ref BankingApiKey]
      KeyType: API_KEY
      UsagePlanId: !Ref BankingUsagePlan

# =============================================================================
# OUTPUTS - Consistent interface matching hotel-api.yaml pattern
# Required outputs: ApiUrl, ApiKey, OpenApiSpecS3Location
# =============================================================================

Outputs:
  # Required output: API endpoint URL
  ApiUrl:
    Description: 'URL of the Banking API'
    Value: !Sub 'https://${BankingApi}.execute-api.${AWS::Region}.amazonaws.com/prod'

  # Required output: API key value for authentication (own key when not using shared)
  ApiKey:
    Condition: CreateOwnApiKey
    Description: 'Value of the API Key for authentication'
    Value: !GetAtt ApiKeyValueRetrieval.ApiKeyValue

  # Required output: S3 location of OpenAPI spec
  OpenApiSpecS3Location:
    Description: 'S3 location of the uploaded OpenAPI specification'
    Value: !GetAtt OpenApiUpload.S3Location

  # Additional outputs for reference
  ApiKeyId:
    Description: 'ID of the effective API key (shared or own)'
    Value: !If [UseSharedApiKey, !Ref SharedApiKeyId, !Ref BankingApiKey]

  OpenApiBucketName:
    Description: 'S3 bucket containing OpenAPI specification'
    Value: !Ref OpenApiBucket

  TransactionsTableName:
    Description: 'DynamoDB Transactions table name'
    Value: !Ref TransactionsTable

  InvoicesTableName:
    Description: 'DynamoDB Invoices table name'
    Value: !Ref InvoicesTable

  RefundsTableName:
    Description: 'DynamoDB Refunds table name'
    Value: !Ref RefundsTable

  DisputesTableName:
    Description: 'DynamoDB Disputes table name'
    Value: !Ref DisputesTable
