    Default: ''
    Description: >-
      S3 URL for the billing-api.yaml nested stack template.
      
      FORMAT: https://{bucket-name}.s3.{region}.amazonaws.com/templates/billing-api.yaml
      
      EXAMPLE: https://my-assets-bucket.s3.us-east-1.amazonaws.com/templates/billing-api.yaml
      
      HOW TO CONSTRUCT:
