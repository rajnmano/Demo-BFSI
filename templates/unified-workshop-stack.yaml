# =============================================================================
# CONDITIONS
# =============================================================================
Conditions:
  # Workshop Studio Detection Condition
  # Use this condition to customize behavior for Workshop Studio vs customer deployments
  IsWorkshopStudio: !Equals [!Ref IsWorkshopStudioEnv, 'yes']
  IsCustomerDeployment: !Equals [!Ref IsWorkshopStudioEnv, 'no']

  # Existing Infrastructure Conditions
  HasExistingConnectInstance: !Not [!Equals [!Ref ExistingConnectInstanceArn, '']]
  CreateConnectInstance: !Equals [!Ref ExistingConnectInstanceArn, '']

  HasExistingAssistant: !Not [!Equals [!Ref ExistingAssistantArn, '']]
  CreateAssistant: !Equals [!Ref ExistingAssistantArn, '']

  # Optional component conditions
  ShouldCreateKnowledgeBase: !Equals [!Ref CreateKnowledgeBase, 'true']
  ShouldCreateSharedApiKey: !Equals [!Ref CreateSharedApiKey, 'true']
  ShouldCreateAIAgents: !And
    - !Equals [!Ref CreateAIAgents, 'true']
    - !Condition ShouldCreateKnowledgeBase

  # AgentCore Gateway condition - requires shared API key and Connect instance
  ShouldCreateAgentCoreGateway: !And
    - !Equals [!Ref CreateAgentCoreGateway, 'true']
    - !Condition ShouldCreateSharedApiKey

  # Instance Attributes and Logging are created when we create the Connect instance or Assistant
  CreateInstanceAttributes: !Condition CreateConnectInstance
  CreateLogging: !Condition CreateAssistant

  # Industry Deployment Conditions - Deploy if 'all' OR specific industry selected
  DeployAll: !Equals [!Ref IndustryMode, 'all']
  
  DeployHotel: !Or
    - !Equals [!Ref IndustryMode, 'all']
    - !Equals [!Ref IndustryMode, 'hotel']
  
  DeployBilling: !Or
    - !Equals [!Ref IndustryMode, 'all']
    - !Equals [!Ref IndustryMode, 'billing']
  
  DeployFacilities: !Or
    - !Equals [!Ref IndustryMode, 'all']
    - !Equals [!Ref IndustryMode, 'facilities']
  
  DeployPublicSector: !Or
    - !Equals [!Ref IndustryMode, 'all']
    - !Equals [!Ref IndustryMode, 'public-sector']
  
  DeployHealthcare: !Or
    - !Equals [!Ref IndustryMode, 'all']
    - !Equals [!Ref IndustryMode, 'healthcare']
  
  DeployRetail: !Or
    - !Equals [!Ref IndustryMode, 'all']
    - !Equals [!Ref IndustryMode, 'retail']
  
  DeployTelecom: !Or
    - !Equals [!Ref IndustryMode, 'all']
    - !Equals [!Ref IndustryMode, 'telecom']
  
  DeployUtilities: !Or
    - !Equals [!Ref IndustryMode, 'all']
    - !Equals [!Ref IndustryMode, 'utilities']
  
  DeployInsurance: !Or
    - !Equals [!Ref IndustryMode, 'all']
    - !Equals [!Ref IndustryMode, 'insurance']

  DeployAutomotive: !Or
    - !Equals [!Ref IndustryMode, 'all']
    - !Equals [!Ref IndustryMode, 'automotive']

  DeployManufacturing: !Or
    - !Equals [!Ref IndustryMode, 'all']
    - !Equals [!Ref IndustryMode, 'manufacturing']

  # Combined conditions for AI Agents + Industry (for conditional outputs)
  # These are needed because CloudFormation cannot export empty values
  CreateAIAgentsAndHotel: !And
    - !Condition ShouldCreateAIAgents
    - !Condition DeployHotel
  
  CreateAIAgentsAndBilling: !And
    - !Condition ShouldCreateAIAgents
    - !Condition DeployBilling
  
  CreateAIAgentsAndFacilities: !And
    - !Condition ShouldCreateAIAgents
    - !Condition DeployFacilities
  
  CreateAIAgentsAndPublicSector: !And
    - !Condition ShouldCreateAIAgents
    - !Condition DeployPublicSector
  
  CreateAIAgentsAndHealthcare: !And
    - !Condition ShouldCreateAIAgents
    - !Condition DeployHealthcare
  
  CreateAIAgentsAndRetail: !And
    - !Condition ShouldCreateAIAgents
    - !Condition DeployRetail
  
  CreateAIAgentsAndTelecom: !And
    - !Condition ShouldCreateAIAgents
    - !Condition DeployTelecom
  
  CreateAIAgentsAndUtilities: !And
    - !Condition ShouldCreateAIAgents
    - !Condition DeployUtilities
  
  CreateAIAgentsAndInsurance: !And
    - !Condition ShouldCreateAIAgents
    - !Condition DeployInsurance

  CreateAIAgentsAndAutomotive: !And
    - !Condition ShouldCreateAIAgents
    - !Condition DeployAutomotive

  CreateAIAgentsAndManufacturing: !And
    - !Condition ShouldCreateAIAgents
    - !Condition DeployManufacturing


# =============================================================================
# RESOURCES
# =============================================================================
Resources:
  # ---------------------------------------------------------------------------
  # Shared API Key (Optional - Default: true)
  # ---------------------------------------------------------------------------
  # When enabled, creates a single shared API key that all industry APIs use.
  # This simplifies AgentCore Gateway configuration - one identity for all APIs.
  # When disabled, each industry module creates its own API key.
  # NOTE: API Gateway limits each API key to 10 usage plans, so we create two
  # shared keys to support all 11 industries.
  
  SharedApiKey:
    Type: AWS::ApiGateway::ApiKey
    Condition: ShouldCreateSharedApiKey
    Properties:
      Name: !Sub '${AWS::StackName}-shared-api-key'
      Description: 'Shared API key for industry APIs (1-10)'
      Enabled: true
      Tags:
        - Key: Purpose
          Value: Shared API Authentication

  # Second shared API key for overflow industries (11+)
  # API Gateway limits each API key to 10 usage plans
  SharedApiKey2:
    Type: AWS::ApiGateway::ApiKey
    Condition: ShouldCreateSharedApiKey
    Properties:
      Name: !Sub '${AWS::StackName}-shared-api-key-2'
      Description: 'Shared API key for overflow industry APIs (11+)'
      Enabled: true
      Tags:
        - Key: Purpose
          Value: Shared API Authentication Overflow

  # Custom Resource Lambda Role for API Key Retrieval
  SharedApiKeyRetrievalRole:
    Type: AWS::IAM::Role
    Condition: ShouldCreateSharedApiKey
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ApiGatewayAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - apigateway:GET
                Resource: !Sub 'arn:aws:apigateway:${AWS::Region}::/apikeys/*'

  # Custom Resource Lambda for Shared API Key Retrieval
  SharedApiKeyFn:
    Type: AWS::Lambda::Function
    Condition: ShouldCreateSharedApiKey
    Properties:
      FunctionName: !Sub '${AWS::StackName}-SharedApiKeyRetrieval'
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt SharedApiKeyRetrievalRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import json
          import boto3
          import urllib3
          import logging
          
          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          
          http = urllib3.PoolManager()
          apigateway = boto3.client('apigateway')
          
          def send_response(event, context, status, data=None, physical_resource_id=None, reason=None):
              response_body = {
                  'Status': status,
                  'Reason': reason or f'See CloudWatch Log Stream: {context.log_stream_name}',
                  'PhysicalResourceId': physical_resource_id or context.log_stream_name,
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': data or {}
              }
              
              logger.info(f'Response body: {json.dumps(response_body)}')
              
              try:
                  response = http.request(
                      'PUT',
                      event['ResponseURL'],
                      body=json.dumps(response_body).encode('utf-8'),
                      headers={'Content-Type': ''}
                  )
                  logger.info(f'CloudFormation response status: {response.status}')
              except Exception as e:
                  logger.error(f'Error sending response: {str(e)}')
                  raise
          
          def handler(event, context):
              logger.info(f'Event: {json.dumps(event)}')
              
              try:
                  request_type = event['RequestType']
                  
                  if request_type == 'Delete':
                      logger.info('Delete request - no action needed')
                      send_response(event, context, 'SUCCESS', {})
                      return
                  
                  api_key_id = event['ResourceProperties']['ApiKeyId']
                  logger.info(f'Retrieving API key value for: {api_key_id}')
                  
                  response = apigateway.get_api_key(
                      apiKey=api_key_id,
                      includeValue=True
                  )
                  
                  api_key_value = response['value']
                  logger.info('Successfully retrieved API key value')
                  
                  send_response(
                      event, 
                      context, 
                      'SUCCESS', 
                      data={'ApiKeyValue': api_key_value},
                      physical_resource_id=api_key_id
                  )
                  
              except Exception as e:
                  logger.error(f'Error retrieving API key: {str(e)}')
                  send_response(event, context, 'FAILED', reason=str(e))

  # Custom Resource for Shared API Key Value Retrieval
  SharedApiKeyValueRetrieval:
    Type: Custom::ApiKeyValueRetrieval
    Condition: ShouldCreateSharedApiKey
    DependsOn: SharedApiKey
    Properties:
      ServiceToken: !GetAtt SharedApiKeyFn.Arn
      ApiKeyId: !Ref SharedApiKey

  # Custom Resource for Second Shared API Key Value Retrieval (for overflow industries)
  SharedApiKey2ValueRetrieval:
    Type: Custom::ApiKeyValueRetrieval
    Condition: ShouldCreateSharedApiKey
    DependsOn: SharedApiKey2
    Properties:
      ServiceToken: !GetAtt SharedApiKeyFn.Arn
      ApiKeyId: !Ref SharedApiKey2

  # ===========================================================================
  # SHARED INFRASTRUCTURE NESTED STACKS (Always Deployed)
  # ===========================================================================
  # These stacks are deployed regardless of IndustryMode selection.
  # They provide the core Amazon Connect and AI Assistant infrastructure.
  # These can be skipped if existing resources are provided via parameters.

  # ---------------------------------------------------------------------------
  # Connect Instance Stack
  # ---------------------------------------------------------------------------
  # Creates the Amazon Connect instance with storage configuration and admin user.
  # This is the foundation for all other Connect-related resources.
  # Skipped if ExistingConnectInstanceArn is provided.
  ConnectStack:
    Type: AWS::CloudFormation::Stack
    Condition: CreateConnectInstance
    Properties:
      TemplateURL: !Ref ConnectInstanceStackUrl
      Tags:
        - Key: Purpose
          Value: Amazon Connect Instance

  # ---------------------------------------------------------------------------
  # Assistant Setup Stack
  # ---------------------------------------------------------------------------
  # Creates the Amazon Q in Connect (Wisdom) Assistant and integrates it
  # with the Connect instance. Depends on ConnectStack.
  # Skipped if ExistingAssistantArn is provided.
  AssistantStack:
    Type: AWS::CloudFormation::Stack
    Condition: CreateAssistant
    Properties:
      TemplateURL: !Ref AssistantSetupStackUrl
      Parameters:
        ConnectInstanceArn: !If
          - CreateConnectInstance
          - !GetAtt ConnectStack.Outputs.ConnectInstanceArn
          - !Ref ExistingConnectInstanceArn
      Tags:
        - Key: Purpose
          Value: Connect Assistant Setup

  # ---------------------------------------------------------------------------
  # Assistant Logging Stack
  # ---------------------------------------------------------------------------
  # Configures CloudWatch Logs delivery for the Connect Assistant.
  # Only created when we create a new Assistant.
  LoggingStack:
    Type: AWS::CloudFormation::Stack
    Condition: CreateLogging
    DependsOn: AssistantStack
    Properties:
      TemplateURL: !Ref AssistantLoggingStackUrl
      Parameters:
        AiAssistantARN: !GetAtt AssistantStack.Outputs.AssistantArn
      Tags:
        - Key: Purpose
          Value: Assistant Logging

  # ---------------------------------------------------------------------------
  # Instance Attributes Stack
  # ---------------------------------------------------------------------------
  # Configures Connect instance attributes and creates Customer Profiles domain.
  # Only created when we create a new Connect instance.
  InstanceAttributesStack:
    Type: AWS::CloudFormation::Stack
    Condition: CreateInstanceAttributes
    Properties:
      TemplateURL: !Ref InstanceAttributesStackUrl
      Parameters:
        ConnectInstanceId: !GetAtt ConnectStack.Outputs.ConnectInstanceId
      Tags:
        - Key: Purpose
          Value: Connect Instance Attributes

  # ---------------------------------------------------------------------------
  # Knowledge Base Stack
  # ---------------------------------------------------------------------------
  # Creates the knowledge base with FAQ documents and associates it
  # with the Connect Assistant. Depends on AssistantStack.
  # Can be skipped by setting CreateKnowledgeBase=false.
  KnowledgeBaseStack:
    Type: AWS::CloudFormation::Stack
    Condition: ShouldCreateKnowledgeBase
    Properties:
      TemplateURL: !Ref AssistantKnowledgeBaseStackUrl
      Parameters:
        KnowledgeBaseZipUrl: !Ref KnowledgeBaseZipUrl
        AssistantArn: !If
          - CreateAssistant
          - !GetAtt AssistantStack.Outputs.AssistantArn
          - !Ref ExistingAssistantArn
        ConnectInstanceId: !If
          - CreateConnectInstance
          - !GetAtt ConnectStack.Outputs.ConnectInstanceId
          - !Ref ExistingConnectInstanceId
        WorkshopStackName: !Ref AWS::StackName
      Tags:
        - Key: Purpose
          Value: Assistant Knowledge Base

  # ===========================================================================
  # INDUSTRY MODULE NESTED STACKS (Conditional)
  # ===========================================================================
  # These stacks are deployed based on the IndustryMode parameter.
  # Each industry module provides API Gateway, Lambda, and DynamoDB resources
  # for its specific use case.

  # ---------------------------------------------------------------------------
  # Hotel API Stack
  # ---------------------------------------------------------------------------
  # Provides hotel reservation management APIs including search hotels,
  # create/modify/cancel reservations, and reservation lookup.
  # Deployed when IndustryMode is 'all' or 'hotel'.
  HotelApiStack:
    Type: AWS::CloudFormation::Stack
    Condition: DeployHotel
    Properties:
      TemplateURL: !Ref HotelApiStackUrl
      Parameters:
        SeedDataUrl: !Ref HotelSeedDataUrl
        OpenApiSpecUrl: !Ref HotelOpenApiSpecUrl
        SharedApiKeyId: !If [ShouldCreateSharedApiKey, !Ref SharedApiKey, '']
      Tags:
        - Key: Purpose
          Value: Hotel Reservation API
        - Key: Industry
          Value: hotel

  # ---------------------------------------------------------------------------
  # Billing API Stack
  # ---------------------------------------------------------------------------
  # Provides billing and payment management APIs including transactions,
  # invoices, refunds, and dispute handling.
  # Deployed when IndustryMode is 'all' or 'billing'.
  BillingApiStack:
    Type: AWS::CloudFormation::Stack
    Condition: DeployBilling
    Properties:
      TemplateURL: !Ref BillingApiStackUrl
      Parameters:
        SeedDataUrl: !Ref BillingSeedDataUrl
        OpenApiSpecUrl: !Ref BillingOpenApiSpecUrl
        SharedApiKeyId: !If [ShouldCreateSharedApiKey, !Ref SharedApiKey, '']
      Tags:
        - Key: Purpose
          Value: Billing System API
        - Key: Industry
          Value: billing

  # ---------------------------------------------------------------------------
  # Facilities API Stack
  # ---------------------------------------------------------------------------
  # Provides facilities management APIs including work order creation,
  # problem classification, technician assignment, and status tracking.
  # Deployed when IndustryMode is 'all' or 'facilities'.
  FacilitiesApiStack:
    Type: AWS::CloudFormation::Stack
    Condition: DeployFacilities
    Properties:
      TemplateURL: !Ref FacilitiesApiStackUrl
      Parameters:
        SeedDataUrl: !Ref FacilitiesSeedDataUrl
        OpenApiSpecUrl: !Ref FacilitiesOpenApiSpecUrl
        SharedApiKeyId: !If [ShouldCreateSharedApiKey, !Ref SharedApiKey, '']
      Tags:
        - Key: Purpose
          Value: Facilities Management API
        - Key: Industry
          Value: facilities

  # ---------------------------------------------------------------------------
  # Public Sector API Stack
  # ---------------------------------------------------------------------------
  # Provides citizen services APIs including permit applications,
  # service requests, appointment scheduling, and case status lookup.
  # Deployed when IndustryMode is 'all' or 'public-sector'.
  PublicSectorApiStack:
    Type: AWS::CloudFormation::Stack
    Condition: DeployPublicSector
    Properties:
      TemplateURL: !Ref PublicSectorApiStackUrl
      Parameters:
        SeedDataUrl: !Ref PublicSectorSeedDataUrl
        OpenApiSpecUrl: !Ref PublicSectorOpenApiSpecUrl
        SharedApiKeyId: !If [ShouldCreateSharedApiKey, !Ref SharedApiKey, '']
      Tags:
        - Key: Purpose
          Value: Public Sector Citizen Services API
        - Key: Industry
          Value: public-sector

  # ---------------------------------------------------------------------------
  # Healthcare API Stack
  # ---------------------------------------------------------------------------
  # Provides patient services APIs including appointment scheduling,
  # prescription refills, provider lookup, and billing inquiries.
  # Deployed when IndustryMode is 'all' or 'healthcare'.
  HealthcareApiStack:
    Type: AWS::CloudFormation::Stack
    Condition: DeployHealthcare
    Properties:
      TemplateURL: !Ref HealthcareApiStackUrl
      Parameters:
        SeedDataUrl: !Ref HealthcareSeedDataUrl
        OpenApiSpecUrl: !Ref HealthcareOpenApiSpecUrl
        SharedApiKeyId: !If [ShouldCreateSharedApiKey, !Ref SharedApiKey, '']
      Tags:
        - Key: Purpose
          Value: Healthcare Patient Services API
        - Key: Industry
          Value: healthcare

  # ---------------------------------------------------------------------------
  # Retail API Stack
  # ---------------------------------------------------------------------------
  # Provides retail e-commerce APIs including orders, returns, products,
  # and loyalty program management.
  # Deployed when IndustryMode is 'all' or 'retail'.
  # NOTE: Uses SharedApiKey2 due to API Gateway's 10 usage plan limit per key
  RetailApiStack:
    Type: AWS::CloudFormation::Stack
    Condition: DeployRetail
    Properties:
      TemplateURL: !Ref RetailApiStackUrl
      Parameters:
        SeedDataUrl: !Ref RetailSeedDataUrl
        OpenApiSpecUrl: !Ref RetailOpenApiSpecUrl
        SharedApiKeyId: !If [ShouldCreateSharedApiKey, !Ref SharedApiKey2, '']
      Tags:
        - Key: Purpose
          Value: Retail E-commerce API
        - Key: Industry
          Value: retail

  # ---------------------------------------------------------------------------
  # Telecom API Stack
  # ---------------------------------------------------------------------------
  # Provides telecommunications customer service APIs including accounts,
  # usage, outages, and troubleshooting ticket management.
  # Deployed when IndustryMode is 'all' or 'telecom'.
  TelecomApiStack:
    Type: AWS::CloudFormation::Stack
    Condition: DeployTelecom
    Properties:
      TemplateURL: !Ref TelecomApiStackUrl
      Parameters:
        SeedDataUrl: !Ref TelecomSeedDataUrl
        OpenApiSpecUrl: !Ref TelecomOpenApiSpecUrl
        SharedApiKeyId: !If [ShouldCreateSharedApiKey, !Ref SharedApiKey, '']
      Tags:
        - Key: Purpose
          Value: Telecom Customer Service API
        - Key: Industry
          Value: telecom

  # ---------------------------------------------------------------------------
  # Utilities API Stack
  # ---------------------------------------------------------------------------
  # Provides utility company customer service APIs including accounts,
  # bills, usage history, outage reporting, and service requests.
  # Deployed when IndustryMode is 'all' or 'utilities'.
  UtilitiesApiStack:
    Type: AWS::CloudFormation::Stack
    Condition: DeployUtilities
    Properties:
      TemplateURL: !Ref UtilitiesApiStackUrl
      Parameters:
        SeedDataUrl: !Ref UtilitiesSeedDataUrl
        OpenApiSpecUrl: !Ref UtilitiesOpenApiSpecUrl
        SharedApiKeyId: !If [ShouldCreateSharedApiKey, !Ref SharedApiKey, '']
      Tags:
        - Key: Purpose
          Value: Utilities Customer Service API
        - Key: Industry
          Value: utilities

  # ---------------------------------------------------------------------------
  # Insurance API Stack
  # ---------------------------------------------------------------------------
  # Provides insurance customer service APIs including policy management,
  # claims processing, quote generation, and billing inquiries.
  # Deployed when IndustryMode is 'all' or 'insurance'.
  InsuranceApiStack:
    Type: AWS::CloudFormation::Stack
    Condition: DeployInsurance
    Properties:
      TemplateURL: !Ref InsuranceApiStackUrl
      Parameters:
        SeedDataUrl: !Ref InsuranceSeedDataUrl
        OpenApiSpecUrl: !Ref InsuranceOpenApiSpecUrl
        SharedApiKeyId: !If [ShouldCreateSharedApiKey, !Ref SharedApiKey, '']
      Tags:
        - Key: Purpose
          Value: Insurance Customer Service API
        - Key: Industry
          Value: insurance

  # ---------------------------------------------------------------------------
  # Automotive API Stack
  # ---------------------------------------------------------------------------
  # Provides automotive customer service APIs including vehicle lookup,
  # warranty management, service scheduling, and recall information.
  # Deployed when IndustryMode is 'all' or 'automotive'.
  # NOTE: Uses SharedApiKey2 due to API Gateway's 10 usage plan limit per key
  AutomotiveApiStack:
    Type: AWS::CloudFormation::Stack
    Condition: DeployAutomotive
    Properties:
      TemplateURL: !Ref AutomotiveApiStackUrl
      Parameters:
        SeedDataUrl: !Ref AutomotiveSeedDataUrl
        OpenApiSpecUrl: !Ref AutomotiveOpenApiSpecUrl
        SharedApiKeyId: !If [ShouldCreateSharedApiKey, !Ref SharedApiKey2, '']
      Tags:
        - Key: Purpose
          Value: Automotive Customer Service API
        - Key: Industry
          Value: automotive

  # ---------------------------------------------------------------------------
  # Manufacturing API Stack
  # ---------------------------------------------------------------------------
  # Provides manufacturing customer service APIs including product lookup,
  # warranty claims, service requests, and parts ordering.
  # Deployed when IndustryMode is 'all' or 'manufacturing'.
  # NOTE: Uses SharedApiKey2 due to API Gateway's 10 usage plan limit per key
  ManufacturingApiStack:
    Type: AWS::CloudFormation::Stack
    Condition: DeployManufacturing
    Properties:
      TemplateURL: !Ref ManufacturingApiStackUrl
      Parameters:
        SeedDataUrl: !Ref ManufacturingSeedDataUrl
        OpenApiSpecUrl: !Ref ManufacturingOpenApiSpecUrl
        SharedApiKeyId: !If [ShouldCreateSharedApiKey, !Ref SharedApiKey2, '']
      Tags:
        - Key: Purpose
          Value: Manufacturing Customer Service API
        - Key: Industry
          Value: manufacturing

  # ===========================================================================
  # AI AGENTS NESTED STACK (Conditional)
  # ===========================================================================
  # Creates AI Prompts and AI Agents for the selected industries.
  # Depends on Assistant and Knowledge Base stacks for required IDs.
  # Deployed when CreateAIAgents=true and Knowledge Base is created.

  AIAgentsStack:
    Type: AWS::CloudFormation::Stack
    Condition: ShouldCreateAIAgents
    DependsOn:
      - KnowledgeBaseStack
    Properties:
      TemplateURL: !Ref AIAgentsStackUrl
      Parameters:
        AssistantId: !If
          - CreateAssistant
          - !GetAtt AssistantStack.Outputs.AssistantId
          - !Ref ExistingAssistantId
        ConnectInstanceId: !If
          - CreateConnectInstance
          - !GetAtt ConnectStack.Outputs.ConnectInstanceId
          - !Ref ExistingConnectInstanceId
        AssistantAssociationId: !GetAtt KnowledgeBaseStack.Outputs.AssistantAssociationId
        IndustryMode: !Ref IndustryMode
        # Boto3 Layer - either pre-existing ARN or S3 bucket/key to create one
        Boto3LayerArn: !Ref Boto3LayerArn
        Boto3LayerS3Bucket: !Ref Boto3LayerS3Bucket
        Boto3LayerS3Key: !Ref Boto3LayerS3Key
        # For BYO account mode - S3 bucket containing prompt files (empty for Workshop Studio)
        AssetsBucketName: !Ref AssetsBucketName
        # AI Agent Prompt URLs (HTTPS ASUs for Workshop Studio, or S3 keys for BYO)
        HotelSelfServicePromptUrl: !Ref HotelSelfServicePromptUrl
        HotelAgentAssistPromptUrl: !Ref HotelAgentAssistPromptUrl
        BillingSelfServicePromptUrl: !Ref BillingSelfServicePromptUrl
        BillingAgentAssistPromptUrl: !Ref BillingAgentAssistPromptUrl
        FacilitiesSelfServicePromptUrl: !Ref FacilitiesSelfServicePromptUrl
        FacilitiesAgentAssistPromptUrl: !Ref FacilitiesAgentAssistPromptUrl
        PublicSectorSelfServicePromptUrl: !Ref PublicSectorSelfServicePromptUrl
        PublicSectorAgentAssistPromptUrl: !Ref PublicSectorAgentAssistPromptUrl
        HealthcareSelfServicePromptUrl: !Ref HealthcareSelfServicePromptUrl
        HealthcareAgentAssistPromptUrl: !Ref HealthcareAgentAssistPromptUrl
        RetailSelfServicePromptUrl: !Ref RetailSelfServicePromptUrl
        RetailAgentAssistPromptUrl: !Ref RetailAgentAssistPromptUrl
        TelecomSelfServicePromptUrl: !Ref TelecomSelfServicePromptUrl
        TelecomAgentAssistPromptUrl: !Ref TelecomAgentAssistPromptUrl
        UtilitiesSelfServicePromptUrl: !Ref UtilitiesSelfServicePromptUrl
        UtilitiesAgentAssistPromptUrl: !Ref UtilitiesAgentAssistPromptUrl
        InsuranceSelfServicePromptUrl: !Ref InsuranceSelfServicePromptUrl
        InsuranceAgentAssistPromptUrl: !Ref InsuranceAgentAssistPromptUrl
        AutomotiveSelfServicePromptUrl: !Ref AutomotiveSelfServicePromptUrl
        AutomotiveAgentAssistPromptUrl: !Ref AutomotiveAgentAssistPromptUrl
        ManufacturingSelfServicePromptUrl: !Ref ManufacturingSelfServicePromptUrl
        ManufacturingAgentAssistPromptUrl: !Ref ManufacturingAgentAssistPromptUrl
      Tags:
        - Key: Purpose
          Value: AI Agents and Prompts

  # ===========================================================================
  # AGENTCORE GATEWAY NESTED STACK (Conditional)
  # ===========================================================================
  # Creates an Amazon Bedrock AgentCore Gateway with Gateway Targets for each
  # deployed industry API. This enables AI Agents to call industry APIs through
  # the Model Context Protocol (MCP).
  # Deployed when CreateAgentCoreGateway=true and shared API keys are created.

  AgentCoreGatewayStack:
    Type: AWS::CloudFormation::Stack
    Condition: ShouldCreateAgentCoreGateway
    Properties:
      TemplateURL: !Ref AgentCoreGatewayStackUrl
      Parameters:
        IndustryMode: !Ref IndustryMode
        SharedApiKeyValue1: !GetAtt SharedApiKeyValueRetrieval.ApiKeyValue
        SharedApiKeyValue2: !GetAtt SharedApiKey2ValueRetrieval.ApiKeyValue
        AgentCoreGatewayDiscoveryUrl: !If
          - CreateConnectInstance
          - !GetAtt ConnectStack.Outputs.AgentCoreGatewayDiscoveryUrl
          - !Sub 'https://${ExistingConnectInstanceAlias}.my.connect.aws/.well-known/openid-configuration'
        Boto3LayerArn: !Ref Boto3LayerArn
      Tags:
        - Key: Purpose
          Value: AgentCore Gateway for MCP Tool Integration

# =============================================================================
# OUTPUTS
# =============================================================================
Outputs:
  # ---------------------------------------------------------------------------
  # Assets Bucket
  # ---------------------------------------------------------------------------
  AssetsBucketName:
    Description: 'The S3 bucket used for assets'
    Value: !Ref AssetsBucketName
    Export:
      Name: !Sub '${AWS::StackName}-AssetsBucket'

  AssetsBucketArn:
    Description: 'ARN of the assets S3 bucket'
    Value: !Sub 'arn:aws:s3:::${AssetsBucketName}'
    Export:
      Name: !Sub '${AWS::StackName}-AssetsBucketArn'

  IndustryModeOutput:
    Description: 'The industry mode selected for this deployment'
    Value: !Ref IndustryMode

  # ---------------------------------------------------------------------------
  # Shared API Key Output (when CreateSharedApiKey=true)
  # ---------------------------------------------------------------------------
  # Two API keys are used due to API Gateway's limit of 10 usage plans per key.
  # SharedApiKey is used for industries 1-10, SharedApiKey2 for overflow (11+).
  SharedApiKeyValue:
    Condition: ShouldCreateSharedApiKey
    Description: 'Shared API key value for industry APIs (1-10). Use for AgentCore Gateway configuration.'
    Value: !GetAtt SharedApiKeyValueRetrieval.ApiKeyValue
    Export:
      Name: !Sub '${AWS::StackName}-SharedApiKey'

  SharedApiKeyId:
    Condition: ShouldCreateSharedApiKey
    Description: 'ID of the shared API key (1-10)'
    Value: !Ref SharedApiKey
    Export:
      Name: !Sub '${AWS::StackName}-SharedApiKeyId'

  SharedApiKey2Id:
    Condition: ShouldCreateSharedApiKey
    Description: 'ID of the second shared API key (overflow industries 11+)'
    Value: !Ref SharedApiKey2
    Export:
      Name: !Sub '${AWS::StackName}-SharedApiKey2Id'

  SharedApiKey2Value:
    Condition: ShouldCreateSharedApiKey
    Description: 'Second shared API key value for overflow industry APIs (retail, manufacturing). Use for AgentCore Gateway configuration.'
    Value: !GetAtt SharedApiKey2ValueRetrieval.ApiKeyValue
    Export:
      Name: !Sub '${AWS::StackName}-SharedApiKey2'

  # ---------------------------------------------------------------------------
  # Shared Infrastructure Outputs
  # ---------------------------------------------------------------------------
  # These outputs resolve to either created resources or provided existing resources

  # Connect Instance Outputs
  ConnectInstanceArn:
    Description: 'ARN of the Amazon Connect instance (created or existing)'
    Value: !If
      - CreateConnectInstance
      - !GetAtt ConnectStack.Outputs.ConnectInstanceArn
      - !Ref ExistingConnectInstanceArn
    Export:
      Name: !Sub '${AWS::StackName}-ConnectInstanceArn'

  ConnectInstanceId:
    Description: 'ID of the Amazon Connect instance (created or existing)'
    Value: !If
      - CreateConnectInstance
      - !GetAtt ConnectStack.Outputs.ConnectInstanceId
      - !Ref ExistingConnectInstanceId
    Export:
      Name: !Sub '${AWS::StackName}-ConnectInstanceId'

  ConnectInstanceAlias:
    Condition: CreateConnectInstance
    Description: 'Alias of the Amazon Connect instance (only when created)'
    Value: !GetAtt ConnectStack.Outputs.ConnectInstanceAlias
    Export:
      Name: !Sub '${AWS::StackName}-ConnectInstanceAlias'

  AdminUsername:
    Condition: CreateConnectInstance
    Description: 'Username for the Connect admin user (only when instance created)'
    Value: !GetAtt ConnectStack.Outputs.AdminUsername

  AdminPassword:
    Condition: CreateConnectInstance
    Description: 'Password for the Connect admin user (only when instance created)'
    Value: !GetAtt ConnectStack.Outputs.AdminPassword

  AgentCoreGatewayDiscoveryUrl:
    Condition: CreateConnectInstance
    Description: 'Connect instance URL for AgentCore Gateway configuration (only when instance created)'
    Value: !GetAtt ConnectStack.Outputs.AgentCoreGatewayDiscoveryUrl
    Export:
      Name: !Sub '${AWS::StackName}-AgentCoreGatewayDiscoveryUrl'

  # Assistant Outputs
  AssistantArn:
    Description: 'ARN of the Connect Assistant (created or existing)'
    Value: !If
      - CreateAssistant
      - !GetAtt AssistantStack.Outputs.AssistantArn
      - !Ref ExistingAssistantArn
    Export:
      Name: !Sub '${AWS::StackName}-AssistantArn'

  AssistantId:
    Description: 'ID of the Connect Assistant (created or existing)'
    Value: !If
      - CreateAssistant
      - !GetAtt AssistantStack.Outputs.AssistantId
      - !Ref ExistingAssistantId
    Export:
      Name: !Sub '${AWS::StackName}-AssistantId'

  # Logging Outputs (only when logging stack is created)
  AssistantLogGroupName:
    Condition: CreateLogging
    Description: 'CloudWatch Log Group for Assistant logs (only when assistant created)'
    Value: !GetAtt LoggingStack.Outputs.LogGroupName
    Export:
      Name: !Sub '${AWS::StackName}-AssistantLogGroupName'

  # Instance Attributes Outputs (only when instance attributes stack is created)
  CustomerProfilesDomainName:
    Condition: CreateInstanceAttributes
    Description: 'Customer Profiles Domain Name (only when Connect instance created)'
    Value: !GetAtt InstanceAttributesStack.Outputs.CustomerProfilesDomainName
    Export:
      Name: !Sub '${AWS::StackName}-CustomerProfilesDomainName'

  # Knowledge Base Outputs (only when knowledge base is created)
  KnowledgeBaseBucketName:
    Condition: ShouldCreateKnowledgeBase
    Description: 'S3 bucket containing knowledge base documents (only when KB created)'
    Value: !GetAtt KnowledgeBaseStack.Outputs.KnowledgeBaseBucketName
    Export:
      Name: !Sub '${AWS::StackName}-KnowledgeBaseBucketName'

  KnowledgeBaseId:
    Condition: ShouldCreateKnowledgeBase
    Description: 'ID of the Connect Assistant Knowledge Base (only when KB created)'
    Value: !GetAtt KnowledgeBaseStack.Outputs.KnowledgeBaseId
    Export:
      Name: !Sub '${AWS::StackName}-KnowledgeBaseId'

  KnowledgeBaseArn:
    Condition: ShouldCreateKnowledgeBase
    Description: 'ARN of the Connect Assistant Knowledge Base (only when KB created)'
