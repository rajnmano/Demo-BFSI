      EXAMPLE: https://my-assets-bucket.s3.us-east-1.amazonaws.com/templates/agentcore-gateway.yaml
      
      HOW TO CONSTRUCT:
      1. Go to S3 Console > Your assets bucket > templates folder
      2. Click on agentcore-gateway.yaml
      3. Copy the Object URL (not the S3 URI)
      
      REQUIRED: Yes, when CreateAgentCoreGateway is set to 'true'.

  AIAgentsStackUrl:
    Type: String
    Default: 'https://my-assets-bucket.s3.us-east-1.amazonaws.com/templates/ai-agents-setup.yaml'
    Description: >-
      S3 URL for the ai-agents-setup.yaml nested stack template.
      
      FORMAT: https://{bucket-name}.s3.{region}.amazonaws.com/templates/ai-agents-setup.yaml
      
      EXAMPLE: https://my-assets-bucket.s3.us-east-1.amazonaws.com/templates/ai-agents-setup.yaml
      
      HOW TO CONSTRUCT:
      1. Go to S3 Console > Your assets bucket > templates folder
      2. Click on ai-agents-setup.yaml
      3. Copy the Object URL (not the S3 URI)
      
      REQUIRED: Yes, when CreateAIAgents is set to 'true'.

  Boto3LayerArn:
    Type: String
    Default: ''
    Description: >-
      ARN of a pre-existing Lambda Layer containing an updated boto3 version.
      Use this for BYO account deployments where you've already created the layer.
      
      If not provided, the template will create a layer from Boto3LayerS3Bucket/Key.
      
      HOW TO CREATE MANUALLY:
      1. Run: scripts/build-boto3-layer.ps1 (creates boto3-layer.zip)
      2. Upload boto3-layer.zip to S3
      3. Create Lambda layer: aws lambda publish-layer-version --layer-name boto3-latest --content S3Bucket=YOUR-BUCKET,S3Key=layers/boto3-layer.zip --compatible-runtimes python3.13
      4. Copy the LayerVersionArn from the output
      
      FORMAT: arn:aws:lambda:{region}:{account}:layer:{layer-name}:{version}
      EXAMPLE: arn:aws:lambda:us-east-1:123456789012:layer:boto3-latest:1

  Boto3LayerS3Bucket:
    Type: String
    Default: 'my-assets-bucket'
    Description: >-
      S3 bucket containing the boto3-layer.zip file for creating a Lambda Layer.
      Use this for Workshop Studio deployments where the layer needs to be created.
      
      For Workshop Studio: Use the ASU bucket (e.g., ws-assets-prod-iad-r-pdx-f3b3f9f1a7d6a3d0)
      For BYO accounts: Use your assets bucket name.
      
      If Boto3LayerArn is provided, this parameter is ignored.

  Boto3LayerS3Key:
    Type: String
    Default: 'boto3-layer/boto3-layer.zip'
    Description: >-
      S3 key (path) to the boto3-layer.zip file within the bucket.
      
      For Workshop Studio: Use the workshop ID prefix (e.g., 9657f1e6-9357-4d9f-8733-d334ebec0aab/boto3-layer.zip)
      For BYO accounts: Use the path where you uploaded the ZIP.
      
      If Boto3LayerArn is provided, this parameter is ignored.

  KnowledgeBaseZipUrl:
    Type: String
    Default: 'https://my-assets-bucket.s3.us-east-1.amazonaws.com/knowledge-base/hotel-kb.zip'
    Description: >-
      S3 URL for the knowledge base documents ZIP file.
      
      FORMAT: https://{bucket-name}.s3.{region}.amazonaws.com/knowledge-base/{industry}-kb.zip
      
      EXAMPLES:
      - Single industry: https://my-assets-bucket.s3.us-east-1.amazonaws.com/knowledge-base/hotel-kb.zip
      - All industries: https://my-assets-bucket.s3.us-east-1.amazonaws.com/knowledge-base/all-industries-kb.zip
      
      HOW TO CONSTRUCT:
      1. Go to S3 Console > Your assets bucket > knowledge-base folder
      2. Click on the appropriate ZIP file for your IndustryMode selection
      3. Copy the Object URL (not the S3 URI)
      
      REQUIRED: Yes, when CreateKnowledgeBase is set to 'true'.
      
      NOTE: Use the ZIP file matching your IndustryMode - use 'all-industries-kb.zip' for IndustryMode='all', or '{industry}-kb.zip' for single industry deployments.

