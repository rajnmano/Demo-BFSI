AWSTemplateFormatVersion: '2010-09-09'
Description: Connect Assistant Logging Setup with CloudWatch Logs Delivery and Dashboard

Metadata:
  Version: "2025-01-01"
  Features: "Tool Usage Monitoring, Self-Service Analytics, Intent Tracking, LLM Performance"

Parameters:
  AiAssistantARN:
    Type: String
    Description: ARN of the AWS Wisdom Assistant
    AllowedPattern: '^arn:aws:wisdom:[a-z0-9-]+:[0-9]{12}:assistant/[a-zA-Z0-9-]+'
    ConstraintDescription: Must be a valid AWS Wisdom Assistant ARN

  LogRetentionDays:
    Type: Number
    Default: 30
    Description: Number of days to retain logs
    AllowedValues:
      - 1
      - 3
      - 5
      - 7
      - 14
      - 30
      - 60
      - 90
      - 120
      - 150
      - 180
      - 365
      - 400
      - 545
      - 731
      - 1827
      - 3653

  CreateDashboard:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Whether to create a CloudWatch Dashboard for monitoring

Conditions:
  ShouldCreateDashboard: !Equals [!Ref CreateDashboard, 'true']

Resources:
  # CloudWatch Log Group for storing assistant event logs
  AssistantLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub
        - /aws/wisdom/assistant/${AssistantId}
        - AssistantId: !Select
            - 1
            - !Split
              - /
              - !Ref AiAssistantARN
      RetentionInDays: !Ref LogRetentionDays
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete

  # Log Delivery Source for the assistant
  AssistantLogDeliverySource:
    Type: AWS::Logs::DeliverySource
    Properties:
      Name: !Sub
        - assistant-${AssistantId}-log-source
        - AssistantId: !Select
            - 1
            - !Split
              - /
              - !Ref AiAssistantARN
      LogType: EVENT_LOGS
      ResourceArn: !Ref AiAssistantARN

  # Log Delivery Destination pointing to the CloudWatch Log Group
  AssistantLogDeliveryDestination:
    Type: AWS::Logs::DeliveryDestination
    Properties:
      Name: !Sub
        - assistant-${AssistantId}-delivery-dest
        - AssistantId: !Select
            - 1
            - !Split
              - /
              - !Ref AiAssistantARN
      DestinationResourceArn: !GetAtt AssistantLogGroup.Arn
      OutputFormat: json
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete

  # Log Delivery configuration connecting source to destination
  AssistantLogDelivery:
    Type: AWS::Logs::Delivery
    Properties:
      DeliverySourceName: !Ref AssistantLogDeliverySource
      DeliveryDestinationArn: !GetAtt AssistantLogDeliveryDestination.Arn

  # CloudWatch Dashboard for Connect AI Agent Monitoring
  CAIADashboard:
    Type: AWS::CloudWatch::Dashboard
    Condition: ShouldCreateDashboard
    Properties:
      DashboardName: !Sub
        - 'connect-ai-agent-dashboard-${AssistantId}'
        - AssistantId: !Select [1, !Split ['/', !Ref AiAssistantARN]]
      DashboardBody: !Sub
        - |
          {
            "widgets": [
              {
                "height": 6,
                "width": 24,
                "x": 0,
                "y": 0,
                "type": "text",
                "properties": {
                  "markdown": "# Connect AI Agent Dashboard\n**Assistant**: ${AiAssistantARN}\n\n### Key Metrics\n* **Session Management**: Monitor session creation and polling\n* **Intent Detection**: Track customer intent recognition\n* **LLM Operations**: Monitor large language model invocations\n* **Recommendations**: Track assistant recommendation delivery\n* **Self-Service**: Monitor customer self-service interactions\n* **Tool Usage**: Track ESCALATION, QUESTION, CONVERSATION, COMPLETE tools\n* **Agentic Processing**: Monitor orchestration agent reasoning and tool planning\n\n### Supported Events\n`TRANSCRIPT_AGENTIC_MESSAGE`, `TRANSCRIPT_CREATE_SESSION`, `TRANSCRIPT_INTENT_TRIGGERING_REFERENCE`, `TRANSCRIPT_LARGE_LANGUAGE_MODEL_INVOCATION`, `TRANSCRIPT_QUERY_ASSISTANT`, `TRANSCRIPT_RECOMMENDATION`, `TRANSCRIPT_RESULT_FEEDBACK`, `TRANSCRIPT_SELF_SERVICE_MESSAGE`, `TRANSCRIPT_SESSION_POLLED`, `TRANSCRIPT_TRIGGER_DETECTION_MODEL_INVOCATION`, `TRANSCRIPT_UTTERANCE`",
                  "background": "transparent"
                }
              },
              {
                "type": "log",
                "x": 0,
                "y": 6,
                "width": 6,
                "height": 6,
                "properties": {
                  "query": "SOURCE '${LogGroupRef}' | fields @timestamp, session_id, session_name\n| filter event_type = 'TRANSCRIPT_CREATE_SESSION'\n| sort @timestamp desc\n| limit 10",
                  "region": "${AWS::Region}",
                  "title": "New Sessions Created",
                  "view": "table"
                }
              },
              {
                "type": "log",
                "x": 6,
                "y": 6,
                "width": 6,
                "height": 6,
                "properties": {
                  "query": "SOURCE '${LogGroupRef}' | fields @timestamp, session_id, intent, intent_id\n| filter event_type = 'TRANSCRIPT_INTENT_TRIGGERING_REFERENCE'\n| sort @timestamp desc\n| limit 10",
                  "region": "${AWS::Region}",
                  "title": "Intent Triggers",
                  "view": "table"
                }
              },
              {
                "type": "log",
                "x": 12,
                "y": 6,
                "width": 6,
                "height": 6,
                "properties": {
                  "query": "SOURCE '${LogGroupRef}' | fields @timestamp, session_id, recommendation_id, intent_clicked\n| filter event_type = 'TRANSCRIPT_RECOMMENDATION'\n| sort @timestamp desc\n| limit 10",
                  "region": "${AWS::Region}",
                  "title": "Recommendations",
                  "view": "table"
                }
              },
              {
                "type": "log",
                "x": 18,
                "y": 6,
                "width": 6,
                "height": 6,
                "properties": {
                  "query": "SOURCE '${LogGroupRef}' | fields @timestamp, is_valid_trigger, issue_probability\n| filter event_type = 'TRANSCRIPT_TRIGGER_DETECTION_MODEL_INVOCATION'\n| sort @timestamp desc\n| limit 10",
                  "region": "${AWS::Region}",
                  "title": "Trigger Detection",
                  "view": "table"
                }
              },
              {
                "type": "log",
                "x": 0,
                "y": 12,
                "width": 12,
                "height": 6,
                "properties": {
                  "query": "SOURCE '${LogGroupRef}' | fields @timestamp, session_message_id, parsed_response\n| filter event_type = 'TRANSCRIPT_SELF_SERVICE_MESSAGE'\n| sort @timestamp desc\n| limit 15",
                  "region": "${AWS::Region}",
                  "title": "Self-Service Messages",
                  "view": "table"
                }
              },
              {
                "type": "log",
                "x": 12,
                "y": 12,
                "width": 6,
                "height": 6,
                "properties": {
                  "query": "SOURCE '${LogGroupRef}' | fields @timestamp, event_type\n| stats count() by event_type\n| sort count desc",
                  "region": "${AWS::Region}",
                  "title": "Event Type Distribution",
                  "view": "table"
                }
              },
              {
                "type": "log",
                "x": 18,
                "y": 12,
                "width": 6,
                "height": 6,
                "properties": {
                  "query": "SOURCE '${LogGroupRef}' | fields @timestamp, completion\n| filter event_type = 'TRANSCRIPT_SELF_SERVICE_MESSAGE' and ispresent(completion)\n| filter completion like /toolUse/\n| parse completion /\"name\":\"(?<tool_name>[^\"]+)\"/\n| stats count() by tool_name\n| sort count desc",
                  "region": "${AWS::Region}",
                  "title": "Tool Usage Distribution",
                  "view": "table"
                }
              },
              {
                "type": "log",
                "x": 0,
                "y": 18,
                "width": 12,
                "height": 6,
                "properties": {
                  "query": "SOURCE '${LogGroupRef}' | fields @timestamp, completion\n| filter event_type = 'TRANSCRIPT_SELF_SERVICE_MESSAGE' and ispresent(completion)\n| filter completion like /toolUse/\n| parse completion /\"name\":\"(?<tool_name>[^\"]+)\"/\n| stats count() by bin(5m), tool_name",
                  "region": "${AWS::Region}",
                  "title": "Tool Usage Over Time (5min intervals)",
                  "view": "table"
                }
              },
              {
                "type": "log",
                "x": 12,
                "y": 18,
                "width": 12,
                "height": 6,
                "properties": {
                  "query": "SOURCE '${LogGroupRef}' | fields @timestamp, session_id, completion, utterance\n| filter event_type = 'TRANSCRIPT_SELF_SERVICE_MESSAGE' and ispresent(completion)\n| filter completion like /toolUse/\n| parse completion /\"name\":\"(?<tool_name>[^\"]+)\"/\n| parse completion /\"message\":\"(?<tool_message>[^\"]+)\"/\n| sort @timestamp desc\n| limit 20",
                  "region": "${AWS::Region}",
                  "title": "Recent Tool Usage - Self-Service Actions",
                  "view": "table"
                }
              },
              {
                "type": "log",
                "x": 0,
                "y": 24,
                "width": 12,
                "height": 6,
                "properties": {
                  "query": "SOURCE '${LogGroupRef}' | fields @timestamp, session_id, ai_agent_id, model_id\n| filter event_type = 'TRANSCRIPT_AGENTIC_MESSAGE'\n| sort @timestamp desc\n| limit 20",
                  "region": "${AWS::Region}",
                  "title": "Agentic Messages",
                  "view": "table"
                }
              },
              {
                "type": "log",
                "x": 12,
                "y": 24,
                "width": 12,
                "height": 6,
                "properties": {
                  "query": "SOURCE '${LogGroupRef}' | fields @timestamp, session_id\n| filter event_type = 'TRANSCRIPT_AGENTIC_MESSAGE'\n| stats count(*) as agentic_steps by session_id\n| sort agentic_steps desc\n| limit 20",
                  "region": "${AWS::Region}",
                  "title": "Agentic Loop Iterations per Session",
                  "view": "table"
                }
              },
              {
                "type": "log",
                "x": 0,
                "y": 30,
                "width": 12,
                "height": 6,
                "properties": {
                  "query": "SOURCE '${LogGroupRef}' | fields @timestamp, model_id\n| filter event_type = 'TRANSCRIPT_LARGE_LANGUAGE_MODEL_INVOCATION'\n| stats count(*) as invocations by model_id\n| sort invocations desc",
                  "region": "${AWS::Region}",
                  "title": "LLM Model Usage",
                  "view": "table"
                }
              },
              {
                "type": "log",
                "x": 12,
                "y": 30,
                "width": 12,
                "height": 6,
                "properties": {
                  "query": "SOURCE '${LogGroupRef}' | fields @timestamp, prompt_type\n| filter event_type = 'TRANSCRIPT_LARGE_LANGUAGE_MODEL_INVOCATION'\n| filter ispresent(prompt_type) and prompt_type != ''\n| stats count(*) as count by prompt_type\n| sort count desc",
                  "region": "${AWS::Region}",
                  "title": "Prompt Type Distribution",
                  "view": "table"
                }
              },
              {
                "type": "log",
                "x": 0,
                "y": 36,
                "width": 24,
                "height": 10,
                "properties": {
                  "query": "SOURCE '${LogGroupRef}' | fields @timestamp, event_type, session_id, session_name, assistant_id, ai_agent_id, intent, recommendation_id, model_id, prompt_type, utterance, is_recommendation_useful\n| sort @timestamp desc\n| limit 50",
                  "region": "${AWS::Region}",
                  "title": "Comprehensive Event Log - All Connect AI Agent Events",
                  "view": "table"
                }
              }
            ]
          }
        - LogGroupRef: !Ref AssistantLogGroup

Outputs:
  LogGroupName:
    Description: Name of the CloudWatch Log Group
    Value: !Ref AssistantLogGroup
    Export:
      Name: !Sub ${AWS::StackName}-LogGroupName

  LogGroupArn:
    Description: ARN of the CloudWatch Log Group
    Value: !GetAtt AssistantLogGroup.Arn
    Export:
      Name: !Sub ${AWS::StackName}-LogGroupArn

  DashboardName:
    Condition: ShouldCreateDashboard
    Description: Name of the CloudWatch Dashboard
    Value: !Ref CAIADashboard
    Export:
      Name: !Sub ${AWS::StackName}-DashboardName

  DashboardURL:
    Condition: ShouldCreateDashboard
    Description: URL to access the CloudWatch Dashboard
    Value: !Sub
      - https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${DashboardName}
      - DashboardName: !Ref CAIADashboard

  LogGroupURL:
    Description: Direct URL to the CloudWatch Log Group
    Value: !Sub https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#logsV2:log-groups/log-group/${AssistantLogGroup}

  SupportedEventTypes:
    Description: List of supported Connect AI Agent event types
    Value: "TRANSCRIPT_AGENTIC_MESSAGE, TRANSCRIPT_CREATE_SESSION, TRANSCRIPT_INTENT_TRIGGERING_REFERENCE, TRANSCRIPT_LARGE_LANGUAGE_MODEL_INVOCATION, TRANSCRIPT_QUERY_ASSISTANT, TRANSCRIPT_RECOMMENDATION, TRANSCRIPT_RESULT_FEEDBACK, TRANSCRIPT_SELF_SERVICE_MESSAGE, TRANSCRIPT_SESSION_POLLED, TRANSCRIPT_TRIGGER_DETECTION_MODEL_INVOCATION, TRANSCRIPT_UTTERANCE"

  ToolUsageQuery:
    Description: CloudWatch Insights query to analyze tool usage patterns
    Value: "filter event_type = 'TRANSCRIPT_SELF_SERVICE_MESSAGE' and ispresent(completion) | filter completion like /toolUse/ | parse completion /\"name\":\"(?<tool_name>[^\"]+)\"/ | stats count() by tool_name"

  AgenticLoopQuery:
    Description: CloudWatch Insights query to count agentic loop iterations per session
    Value: "filter event_type = 'TRANSCRIPT_AGENTIC_MESSAGE' | stats count(*) as agentic_steps by session_id | sort agentic_steps desc"

  TemplateVersion:
    Description: Version of cloud formation template
    Value: v2.0-dashboard
