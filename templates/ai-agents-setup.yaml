# =============================================================================
# PARAMETERS
# =============================================================================
Parameters:
  AssistantId:
    Type: String
    Description: >-
      ID of the Amazon Connect Assistant (Q in Connect). This is the assistant-id portion
      of the Assistant ARN. The AI Prompts and Agents will be created under this assistant.
    AllowedPattern: '^[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$'
    ConstraintDescription: Must be a valid UUID format (e.g., 12345678-1234-1234-1234-123456789012)

  ConnectInstanceId:
    Type: String
    Description: >-
      ID of the Amazon Connect instance. This is the instance-id portion of the Connect
      Instance ARN. Used for security profile associations with AI Agents.
    AllowedPattern: '^[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$'
    ConstraintDescription: Must be a valid UUID format (e.g., 12345678-1234-1234-1234-123456789012)

  AssistantAssociationId:
    Type: String
    Description: >-
      ID or ARN of the Knowledge Base association with the Assistant. This links the AI Agents
      to the Knowledge Base for the Retrieve tool. Obtained from the KnowledgeBaseStack output.
      Format: UUID (e.g., 5cf12f1a-d2e5-428e-96a0-82040eb0a1eb) or 
      ARN (e.g., arn:aws:wisdom:region:account:association/assistant-id/association-id)
    # NOTE: AllowedPattern removed temporarily to debug what value CloudFormation is passing

  # ===========================================================================
  # AI AGENT PROMPT URLs
  # ===========================================================================
  # These URLs point to the AI agent prompt YAML files for each industry.
  # Use Asset Static URLs (ASUs) for Workshop Studio deployments.


  DemoSelfServicePromptUrl:
    Type: String
    Default: ''
    Description: 'URL for demo self-service AI agent prompt YAML file'

  DemoAgentAssistPromptUrl:
    Type: String
    Default: ''
    Description: 'URL for demo agent-assist AI agent prompt YAML file'

  AssetsBucketName:
    Type: String
    Default: ''
    Description: >-
      S3 bucket name for BYO account mode. When prompt URLs are S3 keys (not HTTPS URLs),
      this bucket is used to fetch the prompt files. Leave empty for Workshop Studio mode
      where HTTPS ASU URLs are used.
  IndustryMode:
    Type: String
    Default: 'demo'
  Locale:
    Type: String
    Default: en_US
    AllowedValues:
      - en_US
      - en_GB
      - es_ES
      - fr_FR
      - de_DE
      - ja_JP
      - pt_BR
    Description: >-
      Locale for AI Agent responses. Determines the language and regional settings
      for agent interactions.

  Boto3LayerArn:
    Type: String
    Default: ''
    Description: >-
      ARN of a pre-existing Lambda Layer containing an updated boto3 version.
      Use this for BYO account deployments where you've already created the layer.
      
      If not provided, the template will attempt to create a layer from Boto3LayerS3Bucket/Key.
      
      To create a layer manually: Run scripts/build-boto3-layer.ps1, upload the ZIP to S3,
      then publish as a Lambda layer and provide the ARN here.

  Boto3LayerS3Bucket:
    Type: String
    Default: ''
    Description: >-
      S3 bucket containing the boto3-layer.zip file for creating a Lambda Layer.
      For Workshop Studio: Use the ASU bucket (e.g., ws-assets-prod-iad-r-pdx-f3b3f9f1a7d6a3d0)
      For BYO accounts: Use your assets bucket name.
      
      If Boto3LayerArn is provided, this parameter is ignored.

  Boto3LayerS3Key:
    Type: String
    Default: ''
    Description: >-
      S3 key (path) to the boto3-layer.zip file within the bucket.
      For Workshop Studio: Use the workshop ID prefix (e.g., 9657f1e6-9357-4d9f-8733-d334ebec0aab/boto3-layer.zip)
      For BYO accounts: Use the path where you uploaded the ZIP.
      
      If Boto3LayerArn is provided, this parameter is ignored.

# =============================================================================
# CONDITIONS
# =============================================================================
Conditions:
  # Use pre-existing layer ARN if provided
  HasBoto3LayerArn: !Not [!Equals [!Ref Boto3LayerArn, '']]
  # Create layer from S3 if bucket/key provided and no ARN
  HasBoto3LayerS3: !And
    - !Not [!Equals [!Ref Boto3LayerS3Bucket, '']]
    - !Not [!Equals [!Ref Boto3LayerS3Key, '']]
  # Should create layer from S3 (has bucket/key but no pre-existing ARN)
  ShouldCreateBoto3Layer: !And
    - !Condition HasBoto3LayerS3
    - !Equals [!Ref Boto3LayerArn, '']
  DeployDemo: !Equals [!Ref IndustryMode, 'demo']

# =============================================================================
# RESOURCES
# =============================================================================
Resources:
  # ---------------------------------------------------------------------------
  # Boto3 Lambda Layer (created from S3 if bucket/key provided)
  # ---------------------------------------------------------------------------
  # This layer provides an updated boto3 version that supports the latest
  # Q Connect APIs (e.g., orchestrationAIAgentConfiguration for AI Agents).
  # Created conditionally when Boto3LayerS3Bucket/Key are provided and Boto3LayerArn is not.
  Boto3LambdaLayer:
    Type: AWS::Lambda::LayerVersion
    Condition: ShouldCreateBoto3Layer
    Properties:
      LayerName: !Sub '${AWS::StackName}-boto3'
      Description: 'Updated boto3 for Q Connect AI Agents API support'
      Content:
        S3Bucket: !Ref Boto3LayerS3Bucket
        S3Key: !Ref Boto3LayerS3Key
      CompatibleRuntimes:
        - python3.13
        - python3.12
        - python3.11
      LicenseInfo: 'Apache-2.0'

  # ---------------------------------------------------------------------------
  # CloudWatch Log Group for Custom Resource Lambda
  # ---------------------------------------------------------------------------
  AIAgentsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      # Use shorter name to avoid 64-char Lambda function name limit in nested stacks
      LogGroupName: !Sub '/aws/lambda/${AWS::StackName}-CR'
      RetentionInDays: 7
    DeletionPolicy: Delete

  # ---------------------------------------------------------------------------
  # IAM Role for Custom Resource Lambda
  # ---------------------------------------------------------------------------
  AIAgentsCustomResourceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: AIAgentsCustomResourcePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # S3 permissions for BYO account mode (reading prompts from private S3 buckets)
              # Workshop Studio mode uses HTTPS URLs (ASUs) which don't require S3 permissions
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - kms:Decrypt
                Resource: '*'
              
              # Wisdom/Q Connect API access for AI Prompts
              # Note: Both qconnect:* and wisdom:* prefixes AND resource ARNs are needed
              - Effect: Allow
                Action:
                  - wisdom:CreateAIPrompt
                  - wisdom:CreateAIPromptVersion
                  - wisdom:DeleteAIPrompt
                  - wisdom:ListAIPrompts
                  - wisdom:ListAIPromptVersions
                  - wisdom:GetAIPrompt
                  - wisdom:UpdateAIPrompt
                  - qconnect:CreateAIPrompt
                  - qconnect:CreateAIPromptVersion
                  - qconnect:DeleteAIPrompt
                  - qconnect:ListAIPrompts
                  - qconnect:ListAIPromptVersions
                  - qconnect:GetAIPrompt
                  - qconnect:UpdateAIPrompt
                Resource:
                  - !Sub 'arn:aws:wisdom:${AWS::Region}:${AWS::AccountId}:assistant/${AssistantId}'
                  - !Sub 'arn:aws:wisdom:${AWS::Region}:${AWS::AccountId}:assistant/${AssistantId}/*'
                  - !Sub 'arn:aws:wisdom:${AWS::Region}:${AWS::AccountId}:ai-prompt/${AssistantId}/*'
                  - !Sub 'arn:aws:qconnect:${AWS::Region}:${AWS::AccountId}:assistant/${AssistantId}'
                  - !Sub 'arn:aws:qconnect:${AWS::Region}:${AWS::AccountId}:assistant/${AssistantId}/*'
                  - !Sub 'arn:aws:qconnect:${AWS::Region}:${AWS::AccountId}:ai-prompt/${AssistantId}/*'
              
              # Wisdom/Q Connect API access for AI Agents
              # Note: Both qconnect:* and wisdom:* action prefixes AND resource ARNs are needed
              - Effect: Allow
                Action:
                  - wisdom:CreateAIAgent
                  - wisdom:CreateAIAgentVersion
                  - wisdom:DeleteAIAgent
                  - wisdom:ListAIAgents
                  - wisdom:ListAIAgentVersions
                  - wisdom:GetAIAgent
                  - wisdom:UpdateAIAgent
                  - qconnect:CreateAIAgent
                  - qconnect:CreateAIAgentVersion
                  - qconnect:DeleteAIAgent
                  - qconnect:ListAIAgents
                  - qconnect:ListAIAgentVersions
                  - qconnect:GetAIAgent
                  - qconnect:UpdateAIAgent
                Resource:
                  - !Sub 'arn:aws:wisdom:${AWS::Region}:${AWS::AccountId}:assistant/${AssistantId}'
                  - !Sub 'arn:aws:wisdom:${AWS::Region}:${AWS::AccountId}:assistant/${AssistantId}/*'
                  - !Sub 'arn:aws:wisdom:${AWS::Region}:${AWS::AccountId}:ai-agent/${AssistantId}/*'
                  - !Sub 'arn:aws:qconnect:${AWS::Region}:${AWS::AccountId}:assistant/${AssistantId}'
                  - !Sub 'arn:aws:qconnect:${AWS::Region}:${AWS::AccountId}:assistant/${AssistantId}/*'
                  - !Sub 'arn:aws:qconnect:${AWS::Region}:${AWS::AccountId}:ai-agent/${AssistantId}/*'
              
              # Connect API access for security profiles and AI Agent integration
              # CreateAIAgent with orchestrationAIAgentConfiguration requires Connect instance access
              - Effect: Allow
                Action:
                  - connect:AssociateSecurityProfiles
                  - connect:DisassociateSecurityProfiles
                  - connect:ListSecurityProfiles
                  - connect:ListEntitySecurityProfiles
                  - connect:CreateSecurityProfile
                  - connect:DescribeSecurityProfile
                  - connect:DescribeInstance
                  - connect:GetFederationToken
                Resource:
                  - !Sub 'arn:aws:connect:${AWS::Region}:${AWS::AccountId}:instance/${ConnectInstanceId}'
                  - !Sub 'arn:aws:connect:${AWS::Region}:${AWS::AccountId}:instance/${ConnectInstanceId}/*'
              
              # Additional wisdom/qconnect permissions for tagging
              - Effect: Allow
                Action:
                  - wisdom:TagResource
                  - wisdom:UntagResource
                  - qconnect:TagResource
                  - qconnect:UntagResource
                Resource:
                  - !Sub 'arn:aws:wisdom:${AWS::Region}:${AWS::AccountId}:ai-agent/${AssistantId}/*'
                  - !Sub 'arn:aws:wisdom:${AWS::Region}:${AWS::AccountId}:ai-prompt/${AssistantId}/*'
                  - !Sub 'arn:aws:qconnect:${AWS::Region}:${AWS::AccountId}:ai-agent/${AssistantId}/*'
                  - !Sub 'arn:aws:qconnect:${AWS::Region}:${AWS::AccountId}:ai-prompt/${AssistantId}/*'
              
              # Broad permissions for AI Agent creation - for quick validation
              # TODO: Scope down to specific actions after confirming CreateAIAgent works
              - Effect: Allow
                Action:
                  - wisdom:*
                  - qconnect:*
                  - connect:*
                Resource: '*'
    DeletionPolicy: Delete

  # ---------------------------------------------------------------------------
  # Custom Resource Lambda Function
  # ---------------------------------------------------------------------------
  # NOTE: This Lambda requires an updated boto3 version that supports the
  # orchestrationAIAgentConfiguration parameter for Q Connect AI Agents.
  # The default Lambda runtime boto3 may be outdated.
  # 
  # Provide a Boto3LayerArn parameter with a layer containing updated boto3.
  AIAgentsCustomResourceFn:
    Type: AWS::Lambda::Function
    DependsOn: AIAgentsLogGroup
    Properties:
      # Use shorter name to stay under 64-char limit in nested stacks
      FunctionName: !Sub '${AWS::StackName}-CR'
      Description: Custom Resource Lambda for creating AI Prompts and Agents
      Runtime: python3.13
      Handler: index.handler
      Role: !GetAtt AIAgentsCustomResourceRole.Arn
      Timeout: 300
      MemorySize: 512
      # Conditionally add boto3 layer:
      # - If Boto3LayerArn is provided, use it directly
      # - Else if Boto3LayerS3Bucket/Key are provided, use the created layer
      # - Else no layer (use runtime's built-in boto3)
      Layers: !If
        - HasBoto3LayerArn
        - - !Ref Boto3LayerArn
        - !If
          - ShouldCreateBoto3Layer
          - - !Ref Boto3LambdaLayer
          - !Ref 'AWS::NoValue'
      LoggingConfig:
        LogGroup: !Ref AIAgentsLogGroup
      Code:
        ZipFile: |
          # Copyright 2026 Amazon Web Services
          # SPDX-License-Identifier: MIT-0
          #
          # Permission is hereby granted, free of charge, to any person obtaining a copy of this
          # software and associated documentation files (the "Software"), to deal in the Software
          # without restriction, including without limitation the rights to use, copy, modify,
          # merge, publish, distribute, sublicense, and/or sell copies of the Software, and to
          # permit persons to whom the Software is furnished to do so.
          #
          # THE SOFTWARE IS PROVIDED "AS IS", WITHOUT WARRANTY OF ANY KIND, EXPRESS OR IMPLIED,
          # INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF MERCHANTABILITY, FITNESS FOR A
          # PARTICULAR PURPOSE AND NONINFRINGEMENT. IN NO EVENT SHALL THE AUTHORS OR COPYRIGHT
          # HOLDERS BE LIABLE FOR ANY CLAIM, DAMAGES OR OTHER LIABILITY, WHETHER IN AN ACTION
          # OF CONTRACT, TORT OR OTHERWISE, ARISING FROM, OUT OF OR IN CONNECTION WITH THE
          # SOFTWARE OR THE USE OR OTHER DEALINGS IN THE SOFTWARE.
          
          import json
          import logging
          import time
          import urllib.request
          import urllib.error
          import boto3
          from typing import Dict, List, Optional, Any, Tuple

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          ALL_INDUSTRIES = ["demo"]
          INDUSTRY_CONFIG = {
              "demo": {"name": "Demo", "agent": "Alex", "desc": "banking specialist"},
          }
          SELF_SERVICE_MODEL_ID = "global.anthropic.claude-haiku-4-5-20251001-v1:0"
          AGENT_ASSIST_MODEL_ID = "global.anthropic.claude-sonnet-4-5-20250929-v1:0"

          def send_cfn_response(event, context, status, data=None, reason=None, physical_resource_id=None):
              response_url = event.get('ResponseURL')
              if not response_url:
                  logger.error("No ResponseURL in event")
                  return
              phys_id = physical_resource_id or event.get('PhysicalResourceId') or (context.log_stream_name if context else 'unknown')
              response_body = {
                  'Status': status,
                  'Reason': reason or f'See CloudWatch Log Stream: {context.log_stream_name if context else "unknown"}',
                  'PhysicalResourceId': phys_id,
                  'StackId': event.get('StackId', ''),
                  'RequestId': event.get('RequestId', ''),
                  'LogicalResourceId': event.get('LogicalResourceId', ''),
                  'Data': data or {}
              }
              try:
                  request = urllib.request.Request(response_url, data=json.dumps(response_body).encode('utf-8'), headers={'Content-Type': 'application/json'}, method='PUT')
                  with urllib.request.urlopen(request, timeout=30) as response:
                      logger.info(f"CloudFormation response sent: {response.status}")
              except Exception as e:
                  logger.error(f"Failed to send CloudFormation response: {e}")

          def get_industries_to_deploy(industry_mode):
              if industry_mode == "all":
                  return ALL_INDUSTRIES.copy()
              elif industry_mode in ALL_INDUSTRIES:
                  return [industry_mode]
              else:
                  raise ValueError(f"Invalid IndustryMode: {industry_mode}")

          def load_prompt_from_url(url):
              """Load prompt content from an HTTPS URL (ASU)"""
              if not url:
                  raise Exception("Prompt URL is empty or not provided")
              try:
                  logger.info(f"Fetching prompt from URL: {url}")
                  request = urllib.request.Request(url)
                  with urllib.request.urlopen(request, timeout=30) as response:
                      content = response.read().decode('utf-8')
                      logger.info(f"Successfully fetched prompt ({len(content)} bytes)")
                      return content
              except urllib.error.HTTPError as e:
                  raise Exception(f"HTTP Error fetching prompt from {url}: {e.code} {e.reason}")
              except urllib.error.URLError as e:
                  raise Exception(f"URL Error fetching prompt from {url}: {e.reason}")
              except Exception as e:
                  raise Exception(f"Failed to load prompt from {url}: {str(e)}")

          def load_prompt_from_s3(s3_client, bucket, key):
              """Load prompt content from S3 using SDK (for BYO accounts with private buckets)"""
              try:
                  logger.info(f"Fetching prompt from S3: s3://{bucket}/{key}")
                  response = s3_client.get_object(Bucket=bucket, Key=key)
                  content = response['Body'].read().decode('utf-8')
                  logger.info(f"Successfully fetched prompt from S3 ({len(content)} bytes)")
                  return content
              except Exception as e:
                  raise Exception(f"Failed to load prompt from s3://{bucket}/{key}: {str(e)}")

          def load_prompt(url_or_path, s3_client=None, assets_bucket=None):
              """
              Load prompt content from either HTTPS URL or S3 path.
              
              Supports two modes:
              1. Workshop Studio mode: url_or_path is an HTTPS URL (ASU) - fetched via urllib
              2. BYO account mode: url_or_path is an S3 key path - fetched via S3 SDK
              
              Detection logic:
              - If url_or_path starts with 'https://' -> use HTTPS fetch
              - If url_or_path starts with 's3://' -> parse bucket/key and use S3 SDK
              - Otherwise -> assume it's an S3 key and use assets_bucket parameter
              """
              if not url_or_path:
                  raise Exception("Prompt URL/path is empty or not provided")
              
              # Mode 1: HTTPS URL (Workshop Studio ASU)
              if url_or_path.startswith('https://'):
                  return load_prompt_from_url(url_or_path)
              
              # Mode 2: S3 URI (s3://bucket/key)
              if url_or_path.startswith('s3://'):
                  if not s3_client:
                      s3_client = boto3.client('s3')
                  # Parse s3://bucket/key format
                  path_without_prefix = url_or_path[5:]  # Remove 's3://'
                  parts = path_without_prefix.split('/', 1)
                  if len(parts) != 2:
                      raise Exception(f"Invalid S3 URI format: {url_or_path}")
                  bucket, key = parts
                  return load_prompt_from_s3(s3_client, bucket, key)
              
              # Mode 3: S3 key path (requires assets_bucket parameter)
              if assets_bucket:
                  if not s3_client:
                      s3_client = boto3.client('s3')
                  return load_prompt_from_s3(s3_client, assets_bucket, url_or_path)
              
              # Fallback: try as HTTPS URL anyway
              logger.warning(f"Unknown URL format, attempting HTTPS fetch: {url_or_path}")
              return load_prompt_from_url(url_or_path)

          def find_existing_prompt(qconnect_client, assistant_id, prompt_name):
              try:
                  paginator = qconnect_client.get_paginator('list_ai_prompts')
                  for page in paginator.paginate(assistantId=assistant_id):
                      for prompt in page.get('aiPromptSummaries', []):
                          if prompt.get('name') == prompt_name:
                              return prompt
              except Exception as e:
                  logger.warning(f"Error listing prompts: {e}")
              return None

          def find_existing_agent(qconnect_client, assistant_id, agent_name):
              try:
                  paginator = qconnect_client.get_paginator('list_ai_agents')
                  for page in paginator.paginate(assistantId=assistant_id):
                      for agent in page.get('aiAgentSummaries', []):
                          if agent.get('name') == agent_name:
                              return agent
              except Exception as e:
                  logger.warning(f"Error listing agents: {e}")
              return None

          def build_self_service_tools(assistant_association_id):
              return [
                  {"toolName": "Complete", "toolType": "RETURN_TO_CONTROL", "description": "Close conversation when customer has no more questions", "instruction": {"instruction": "Mark the conversation as complete ONLY after confirming the customer has no additional questions or needs."}, "inputSchema": {"type": "object", "properties": {"reason": {"type": "string", "description": "Reason of completion"}}, "required": ["reason"]}, "userInteractionConfiguration": {"isUserConfirmationRequired": False}},
                  {"toolName": "Escalate", "toolType": "RETURN_TO_CONTROL", "description": "Escalate to human agent when customer issue cannot be solved", "instruction": {"instruction": "Escalate the conversation to a human agent when you cannot provide adequate assistance or when the customer request requires human intervention."}, "inputSchema": {"type": "object", "properties": {"reason": {"type": "string", "description": "Reason of escalation"}}, "required": ["reason"]}, "userInteractionConfiguration": {"isUserConfirmationRequired": False}},
                  {"toolName": "Retrieve", "toolType": "MODEL_CONTEXT_PROTOCOL", "toolId": "aws_service__qconnect_Retrieve", "instruction": {"instruction": "Search the knowledge base using semantic search to find relevant information."}, "overrideInputValues": [{"jsonPath": "$.retrievalConfiguration.knowledgeSource.assistantAssociationIds", "value": {"constant": {"type": "JSON_STRING", "value": f'["{assistant_association_id}"]'}}}, {"jsonPath": "$.assistantId", "value": {"constant": {"type": "STRING", "value": "{{$.assistantId}}"}}}], "userInteractionConfiguration": {"isUserConfirmationRequired": False}}
              ]

          def build_agent_assist_tools(assistant_association_id):
              # Standardized Retrieve tool instruction from retrieve.txt
              retrieve_instruction = "Search the knowledge base using semantic search to find relevant information.\n\nWhen summarizing retrieve tool results, you must include source citations in the format shown in good examples below.\nMUST ensure every message_part has sources. You can include preamble text like 'Here's what I found' but combine it with sourced content in the same message_part.\nMUST include source citations for ALL information from retrieve results.\nAdditional messages which do not need citations can be included in separate message blocks.\nIf retrieve returns no results or empty results, acknowledge that you don't have that specific information available. Do not make assumptions or provide information from general knowledge."
              retrieve_examples = [
                  "Good example - multiple message parts with sources.\n<message>\n  <message_part>\n    <text>This is the first part of the answer.</text>\n    <sources>\n      <sourceId>sampleSourceId_1</sourceId>\n      <sourceId>sampleSourceId_2</sourceId>\n    </sources>\n  </message_part>\n  <message_part>\n    <text>This is the second part with different sources.</text>\n    <sources>\n      <sourceId>sampleSourceId_3</sourceId>\n    </sources>\n  </message_part>\n</message>",
                  "Good example - single message part with source\n <message>\n   <message_part>\n     <text>I found information about your warranty. It covers parts replacement for any manufacturing defects during the first year.</text>\n     <sources>\n       <sourceId>warranty_policy_2024</sourceId>\n     </sources>\n   </message_part>\n </message>",
                  "Bad example - message parts without sources (avoid this):\n <message>\n   <message_part>\n     <text>Here's what I found about your warranty:</text>\n   </message_part>\n   <message_part>\n     <text>It covers parts replacement.</text>\n     <sources>\n       <sourceId>warranty_policy_2024</sourceId>\n     </sources>\n   </message_part>\n </message>",
                  "Bad example - Text outside message parts after citations (avoid this):\n <message>\n   <message_part>\n     <text>Your warranty covers parts replacement for manufacturing defects.</text>\n     <sources>\n       <sourceId>warranty_policy_2024</sourceId>\n     </sources>\n   </message_part>\n   Let me know if you need anything else.\n </message>",
                  "Bad example - Providing information from retrieve results without citations (avoid this):\n <message>\n We offer extended warranty coverage for eligible products beyond the manufacturer's warranty period.\n </message>",
                  "Good example - some messages with citations and some without:\n<message>\n  <message_part>\n    <text>Based on our return policy, you can return most items within 30 days of purchase for a full refund. Items must be in original condition with receipt or proof of purchase.</text>\n    <sources>\n      <sourceId>return_policy_2024</sourceId>\n      <sourceId>customer_handbook_3_2</sourceId>\n    </sources>\n  </message_part>\n</message>\n\n<message>\nI'm still looking up the specific warranty coverage details for electronics. I'll have that information for you shortly.\n</message>",
                  "Example for no results:\n<message>\nI don't have specific information about that topic available.\n</message>"
              ]
              return [
                  {"toolName": "GenerateNotes", "toolType": "MODEL_CONTEXT_PROTOCOL", "toolId": "aws_service__qconnect_QueryAssistant", "instruction": {"instruction": "Required when asked to generate notes, summaries, and overviews about a conversation and its contents. Output from this tool contains HTML tags that should be provided directly in your response so it renders correctly. Do not re-summarize the output - provide the HTML directly.", "examples": ["## Tool Output\n<notes><b>Customer Issue</b><ul><li>Unable to return defective printer via website</li><li>Return window closed</li><li>Payment method no longer valid</li></ul><b>Agent Resolution</b><ul><li>Made exception for return</li><li>Identified manufacturer defect recall</li><li>Processed return</li><li>Documented issue for banking department</li></ul><b>Next Steps</b><ul><li>Banking department to contact customer within 3-5 business days</li></ul><b>Profile Information</b><ul><li>Printer model has a manufacturer defect recall</li></ul></notes>\n\n## Your Response - provide the HTML directly:\n<message><b>Customer Issue</b><ul><li>Unable to return defective printer via website</li><li>Return window closed</li><li>Payment method no longer valid</li></ul><b>Agent Resolution</b><ul><li>Made exception for return</li><li>Identified manufacturer defect recall</li><li>Processed return</li><li>Documented issue for banking department</li></ul><b>Next Steps</b><ul><li>Banking department to contact customer within 3-5 business days</li></ul><b>Profile Information</b><ul><li>Printer model has a manufacturer defect recall</li></ul> </message>"]}, "overrideInputValues": [{"jsonPath": "$.assistantId", "value": {"constant": {"type": "STRING", "value": "{{$.assistantId}}"}}}, {"jsonPath": "$.sessionId", "value": {"constant": {"type": "STRING", "value": "{{$.sessionId}}"}}}, {"jsonPath": "$.queryCondition", "value": {"constant": {"type": "JSON_STRING", "value": "[{\"single\": {\"comparator\": \"EQUALS\", \"field\": \"RESULT_TYPE\", \"value\": \"NOTES\"}}]"}}}], "userInteractionConfiguration": {"isUserConfirmationRequired": False}},
                  {"toolName": "Retrieve", "toolType": "MODEL_CONTEXT_PROTOCOL", "toolId": "aws_service__qconnect_Retrieve", "instruction": {"instruction": retrieve_instruction, "examples": retrieve_examples}, "overrideInputValues": [{"jsonPath": "$.retrievalConfiguration.knowledgeSource.assistantAssociationIds", "value": {"constant": {"type": "JSON_STRING", "value": f'["{assistant_association_id}"]'}}}, {"jsonPath": "$.assistantId", "value": {"constant": {"type": "STRING", "value": "{{$.assistantId}}"}}}], "userInteractionConfiguration": {"isUserConfirmationRequired": False}}
              ]

          def create_ai_prompt(qconnect_client, assistant_id, industry, prompt_type, prompt_content):
              config = INDUSTRY_CONFIG[industry]
              if prompt_type == "self-service":
                  name = f"{config['name']}-Self-Service-Prompt"
                  description = f"Self-service orchestration prompt for {config['agent']}, the {config['desc']}"
                  model_id = SELF_SERVICE_MODEL_ID
              else:
                  name = f"{config['name']}-Agent-Assist-Prompt"
                  description = f"Agent assistance orchestration prompt for {config['name']} support"
                  model_id = AGENT_ASSIST_MODEL_ID
              
              existing = find_existing_prompt(qconnect_client, assistant_id, name)
              if existing:
                  prompt_id = existing['aiPromptId']
                  logger.info(f"Using existing prompt: {name} ({prompt_id})")
                  try:
                      versions = qconnect_client.list_ai_prompt_versions(assistantId=assistant_id, aiPromptId=prompt_id)
                      if versions.get('aiPromptVersionSummaries'):
                          latest = sorted(versions['aiPromptVersionSummaries'], key=lambda x: x.get('versionNumber', 0), reverse=True)[0]
                          return prompt_id, f"{prompt_id}:{latest['versionNumber']}"
                  except Exception as e:
                      logger.warning(f"Error getting prompt versions: {e}")
                  version_response = qconnect_client.create_ai_prompt_version(assistantId=assistant_id, aiPromptId=prompt_id)
                  version_num = version_response.get('aiPrompt', {}).get('versionNumber', 1)
                  return prompt_id, f"{prompt_id}:{version_num}"
              
              response = qconnect_client.create_ai_prompt(
                  assistantId=assistant_id, name=name, type="ORCHESTRATION", description=description,
                  templateType="TEXT", templateConfiguration={"textFullAIPromptEditTemplateConfiguration": {"text": prompt_content}},
                  modelId=model_id, apiFormat="MESSAGES", visibilityStatus="PUBLISHED"
              )
              prompt_id = response['aiPrompt']['aiPromptId']
              logger.info(f"Created prompt: {name} ({prompt_id})")
              version_response = qconnect_client.create_ai_prompt_version(assistantId=assistant_id, aiPromptId=prompt_id)
              version_num = version_response.get('aiPrompt', {}).get('versionNumber', 1)
              return prompt_id, f"{prompt_id}:{version_num}"

          def create_ai_agent(qconnect_client, assistant_id, industry, agent_type, prompt_version_arn, connect_instance_arn, assistant_association_id, locale):
              config = INDUSTRY_CONFIG[industry]
              if agent_type == "self-service":
                  name = f"{config['name']}-Self-Service-Agent"
                  description = f"Self-service AI agent for {config['name']} with {config['agent']} personality"
                  tools = build_self_service_tools(assistant_association_id)
              else:
                  name = f"{config['name']}-Agent-Assist-Agent"
                  description = f"Agent assistance AI for helping human agents with {config['name']} inquiries"
                  tools = build_agent_assist_tools(assistant_association_id)
              
              existing = find_existing_agent(qconnect_client, assistant_id, name)
              if existing:
                  agent_id = existing['aiAgentId']
                  logger.info(f"Deleting existing agent: {name} ({agent_id})")
                  try:
                      versions = qconnect_client.list_ai_agent_versions(assistantId=assistant_id, aiAgentId=agent_id)
                      for version in versions.get('aiAgentVersionSummaries', []):
                          version_num = version.get('versionNumber')
                          if version_num and version_num != 'DRAFT':
                              try:
                                  qconnect_client.delete_ai_agent(assistantId=assistant_id, aiAgentId=f"{agent_id}:{version_num}")
                              except Exception as e:
                                  logger.warning(f"Error deleting agent version {version_num}: {e}")
                      qconnect_client.delete_ai_agent(assistantId=assistant_id, aiAgentId=agent_id)
                      time.sleep(2)
                  except Exception as e:
                      logger.warning(f"Error deleting existing agent: {e}")
              
              agent_config = {"orchestrationAIAgentConfiguration": {"orchestrationAIPromptId": prompt_version_arn, "connectInstanceArn": connect_instance_arn, "locale": locale, "toolConfigurations": tools}}
              response = qconnect_client.create_ai_agent(assistantId=assistant_id, name=name, type="ORCHESTRATION", description=description, configuration=agent_config, visibilityStatus="PUBLISHED")
              agent_id = response['aiAgent']['aiAgentId']
              logger.info(f"Created agent: {name} ({agent_id})")
              version_response = qconnect_client.create_ai_agent_version(assistantId=assistant_id, aiAgentId=agent_id)
              version_num = version_response.get('aiAgent', {}).get('versionNumber', 1)
              return agent_id, version_num

          def get_security_profile_arn_variants(region, account_id, assistant_id, agent_id, version):
              base_arn = f"arn:aws:wisdom:{region}:{account_id}:ai-agent/{assistant_id}/{agent_id}"
              return [f"{base_arn}:$SAVED", f"{base_arn}:$LATEST", f"{base_arn}:{version}"]

          def associate_security_profile(connect_client, connect_instance_id, security_profile_id, agent_arns):
              for arn in agent_arns:
                  try:
                      connect_client.associate_security_profiles(InstanceId=connect_instance_id, EntityType='AI_AGENT', EntityArn=arn, SecurityProfiles=[{'Id': security_profile_id}])
                      logger.info(f"Associated security profile with {arn}")
                  except Exception as e:
                      logger.warning(f"Failed to associate security profile with {arn}: {e}")

          def delete_ai_agent(qconnect_client, assistant_id, agent_id):
              try:
                  versions = qconnect_client.list_ai_agent_versions(assistantId=assistant_id, aiAgentId=agent_id)
                  for version in versions.get('aiAgentVersionSummaries', []):
                      version_num = version.get('versionNumber')
                      if version_num and version_num != 'DRAFT':
                          try:
                              qconnect_client.delete_ai_agent(assistantId=assistant_id, aiAgentId=f"{agent_id}:{version_num}")
                          except Exception as e:
                              logger.warning(f"Error deleting agent version {version_num}: {e}")
                  qconnect_client.delete_ai_agent(assistantId=assistant_id, aiAgentId=agent_id)
                  logger.info(f"Deleted agent: {agent_id}")
              except Exception as e:
                  logger.warning(f"Error deleting agent {agent_id}: {e}")

          def delete_ai_prompt(qconnect_client, assistant_id, prompt_id):
              try:
                  versions = qconnect_client.list_ai_prompt_versions(assistantId=assistant_id, aiPromptId=prompt_id)
                  for version in versions.get('aiPromptVersionSummaries', []):
                      version_num = version.get('versionNumber')
                      if version_num and version_num != 'DRAFT':
                          try:
                              qconnect_client.delete_ai_prompt(assistantId=assistant_id, aiPromptId=f"{prompt_id}:{version_num}")
                          except Exception as e:
                              logger.warning(f"Error deleting prompt version {version_num}: {e}")
                  qconnect_client.delete_ai_prompt(assistantId=assistant_id, aiPromptId=prompt_id)
                  logger.info(f"Deleted prompt: {prompt_id}")
              except Exception as e:
                  logger.warning(f"Error deleting prompt {prompt_id}: {e}")

          def deploy_industry(qconnect_client, connect_client, industry, assistant_id, connect_instance_id, assistant_association_id, ss_prompt_url, aa_prompt_url, locale, region, account_id, security_profile_id=None, s3_client=None, assets_bucket=None):
              results = {'industry': industry, 'selfServicePromptId': None, 'selfServiceAgentId': None, 'agentAssistPromptId': None, 'agentAssistAgentId': None}
              connect_instance_arn = f"arn:aws:connect:{region}:{account_id}:instance/{connect_instance_id}"
              
              ss_content = load_prompt(ss_prompt_url, s3_client, assets_bucket)
              ss_prompt_id, ss_versioned_arn = create_ai_prompt(qconnect_client, assistant_id, industry, "self-service", ss_content)
              results['selfServicePromptId'] = ss_prompt_id
              
              aa_content = load_prompt(aa_prompt_url, s3_client, assets_bucket)
              aa_prompt_id, aa_versioned_arn = create_ai_prompt(qconnect_client, assistant_id, industry, "agent-assist", aa_content)
              results['agentAssistPromptId'] = aa_prompt_id
              
              ss_agent_id, ss_version = create_ai_agent(qconnect_client, assistant_id, industry, "self-service", ss_versioned_arn, connect_instance_arn, assistant_association_id, locale)
              results['selfServiceAgentId'] = ss_agent_id
              if security_profile_id:
                  ss_arns = get_security_profile_arn_variants(region, account_id, assistant_id, ss_agent_id, ss_version)
                  associate_security_profile(connect_client, connect_instance_id, security_profile_id, ss_arns)
              
              aa_agent_id, aa_version = create_ai_agent(qconnect_client, assistant_id, industry, "agent-assist", aa_versioned_arn, connect_instance_arn, assistant_association_id, locale)
              results['agentAssistAgentId'] = aa_agent_id
              if security_profile_id:
                  aa_arns = get_security_profile_arn_variants(region, account_id, assistant_id, aa_agent_id, aa_version)
                  associate_security_profile(connect_client, connect_instance_id, security_profile_id, aa_arns)
              
              return results

          def get_prompt_urls_for_industry(props, industry):
              """Get the prompt URLs for a specific industry from the resource properties"""
              # Map industry names to parameter name prefixes
              industry_to_prefix = {
                  "demo": "Demo"
              }
              prefix = industry_to_prefix.get(industry)
              if not prefix:
                  raise ValueError(f"Unknown industry: {industry}")
              
              ss_url = props.get(f'{prefix}SelfServicePromptUrl', '')
              aa_url = props.get(f'{prefix}AgentAssistPromptUrl', '')
              
              if not ss_url:
                  raise ValueError(f"Missing {prefix}SelfServicePromptUrl parameter")
              if not aa_url:
                  raise ValueError(f"Missing {prefix}AgentAssistPromptUrl parameter")
              
              return ss_url, aa_url

          def handle_create(event, context, qconnect_client, connect_client, s3_client=None):
              props = event.get('ResourceProperties', {})
              assistant_id = props['AssistantId']
              connect_instance_id = props['ConnectInstanceId']
              assistant_association_id = props['AssistantAssociationId']
              industry_mode = props.get('IndustryMode', 'all')
              locale = props.get('Locale', 'en_US')
              security_profile_id = props.get('SecurityProfileId')
              assets_bucket = props.get('AssetsBucketName', '')  # For BYO account S3 mode
              region = context.invoked_function_arn.split(':')[3]
              account_id = context.invoked_function_arn.split(':')[4]
              
              industries = get_industries_to_deploy(industry_mode)
              logger.info(f"Deploying AI Agents for industries: {industries}")
              response_data = {}
              
              for industry in industries:
                  ss_prompt_url, aa_prompt_url = get_prompt_urls_for_industry(props, industry)
                  logger.info(f"Deploying {industry} with prompts: SS={ss_prompt_url}, AA={aa_prompt_url}")
                  results = deploy_industry(qconnect_client, connect_client, industry, assistant_id, connect_instance_id, assistant_association_id, ss_prompt_url, aa_prompt_url, locale, region, account_id, security_profile_id, s3_client, assets_bucket)
                  config = INDUSTRY_CONFIG[industry]
                  prefix = config['name']
                  response_data[f'{prefix}SelfServiceAgentId'] = results['selfServiceAgentId']
                  response_data[f'{prefix}AgentAssistAgentId'] = results['agentAssistAgentId']
                  response_data[f'{prefix}SelfServicePromptId'] = results['selfServicePromptId']
                  response_data[f'{prefix}AgentAssistPromptId'] = results['agentAssistPromptId']
              
              return response_data

          def disassociate_all_security_profiles(connect_client, connect_instance_id, agent_arn):
              """Disassociate all security profiles from an AI Agent before deletion."""
              try:
                  # List all security profiles associated with this agent
                  response = connect_client.list_entity_security_profiles(
                      InstanceId=connect_instance_id,
                      EntityArn=agent_arn,
                      EntityType='AI_AGENT'
                  )
                  security_profile_items = response.get('SecurityProfileItems', [])
                  
                  if security_profile_items:
                      # Extract just the IDs - DisassociateSecurityProfiles expects list of {'Id': 'xxx'}
                      security_profiles = [{'Id': sp['Id']} for sp in security_profile_items]
                      logger.info(f"Disassociating {len(security_profiles)} security profiles from {agent_arn}: {security_profiles}")
                      connect_client.disassociate_security_profiles(
                          InstanceId=connect_instance_id,
                          EntityArn=agent_arn,
                          EntityType='AI_AGENT',
                          SecurityProfiles=security_profiles
                      )
                      logger.info(f"Successfully disassociated security profiles from {agent_arn}")
                  else:
                      logger.info(f"No security profiles found for {agent_arn}")
              except Exception as e:
                  logger.warning(f"Error disassociating security profiles from {agent_arn}: {e}")

          def handle_delete(event, context, qconnect_client, connect_client):
              props = event.get('ResourceProperties', {})
              assistant_id = props['AssistantId']
              connect_instance_id = props['ConnectInstanceId']
              industry_mode = props.get('IndustryMode', 'all')
              industries = get_industries_to_deploy(industry_mode)
              region = context.invoked_function_arn.split(':')[3]
              account_id = context.invoked_function_arn.split(':')[4]
              logger.info(f"Deleting AI Agents for industries: {industries}")
              
              for industry in industries:
                  config = INDUSTRY_CONFIG[industry]
                  for agent_type in ['Self-Service', 'Agent-Assist']:
                      agent_name = f"{config['name']}-{agent_type}-Agent"
                      existing = find_existing_agent(qconnect_client, assistant_id, agent_name)
                      if existing:
                          agent_id = existing['aiAgentId']
                          # Disassociate security profiles before deleting
                          # Try multiple ARN variants
                          for suffix in ['', ':$SAVED', ':$LATEST', ':1']:
                              agent_arn = f"arn:aws:wisdom:{region}:{account_id}:ai-agent/{assistant_id}/{agent_id}{suffix}"
                              disassociate_all_security_profiles(connect_client, connect_instance_id, agent_arn)
                          delete_ai_agent(qconnect_client, assistant_id, agent_id)
                  for prompt_type in ['Self-Service', 'Agent-Assist']:
                      prompt_name = f"{config['name']}-{prompt_type}-Prompt"
                      existing = find_existing_prompt(qconnect_client, assistant_id, prompt_name)
                      if existing:
                          delete_ai_prompt(qconnect_client, assistant_id, existing['aiPromptId'])
              return {}

          def handler(event, context):
              logger.info(f"Received event: {json.dumps(event, default=str)}")
              request_type = event.get('RequestType', '')
              physical_resource_id = event.get('PhysicalResourceId', f"ai-agents-{context.aws_request_id}")
              
              try:
                  s3_client = boto3.client('s3')  # For BYO account S3 mode
                  qconnect_client = boto3.client('qconnect')
                  connect_client = boto3.client('connect')
                  
                  if request_type == 'Create':
                      response_data = handle_create(event, context, qconnect_client, connect_client, s3_client)
                      send_cfn_response(event, context, 'SUCCESS', response_data, physical_resource_id=physical_resource_id)
                  elif request_type == 'Update':
                      response_data = handle_create(event, context, qconnect_client, connect_client, s3_client)
                      send_cfn_response(event, context, 'SUCCESS', response_data, physical_resource_id=physical_resource_id)
                  elif request_type == 'Delete':
                      response_data = handle_delete(event, context, qconnect_client, connect_client)
                      send_cfn_response(event, context, 'SUCCESS', response_data, physical_resource_id=physical_resource_id)
                  else:
                      raise ValueError(f"Unknown RequestType: {request_type}")
              except Exception as e:
                  logger.error(f"Error handling {request_type}: {e}", exc_info=True)
                  send_cfn_response(event, context, 'FAILED', reason=str(e), physical_resource_id=physical_resource_id)

  # ---------------------------------------------------------------------------
  # Security Profile for AI Agents
  # ---------------------------------------------------------------------------
  # This security profile grants permissions needed for AI Agents to function.
  # It is associated with each AI Agent after creation.
  AIAgentsSecurityProfile:
    Type: AWS::Connect::SecurityProfile
    Properties:
      InstanceArn: !Sub 'arn:aws:connect:${AWS::Region}:${AWS::AccountId}:instance/${ConnectInstanceId}'
      # Include IndustryMode in name to avoid conflicts when multiple stacks use same Connect instance
      SecurityProfileName: !Sub 'Workshop AI Agent - ${IndustryMode} - ${AWS::StackName}'
      Description: 'Security profile for workshop AI Agents with permissions for knowledge base, cases, and customer profiles'
      Permissions:
        - BasicAgentAccess
        - Cases.Create
        - Cases.Edit
        - Cases.View
        - Wisdom.View
        - CustomerProfiles.View
      Tags:
        - Key: Purpose
          Value: AI Agents Security Profile
        - Key: CreatedBy
          Value: CloudFormation
        - Key: IndustryMode
          Value: !Ref IndustryMode

  # ---------------------------------------------------------------------------
  # Custom Resource that invokes the Lambda
  # ---------------------------------------------------------------------------
  AIAgentsCustomResource:
    Type: Custom::AIAgents
    DependsOn:
      - AIAgentsCustomResourceFn
      - AIAgentsCustomResourceRole
      - AIAgentsSecurityProfile
    Properties:
      ServiceToken: !GetAtt AIAgentsCustomResourceFn.Arn
      AssistantId: !Ref AssistantId
      ConnectInstanceId: !Ref ConnectInstanceId
      AssistantAssociationId: !Ref AssistantAssociationId
      IndustryMode: !Ref IndustryMode
      Locale: !Ref Locale
      SecurityProfileId: !Select [3, !Split ['/', !GetAtt AIAgentsSecurityProfile.SecurityProfileArn]]
      # For BYO account mode - S3 bucket containing prompt files
      AssetsBucketName: !Ref AssetsBucketName
      # AI Agent Prompt URLs (HTTPS ASUs for Workshop Studio, or S3 keys for BYO)
      DemoSelfServicePromptUrl: !Ref DemoSelfServicePromptUrl
      DemoAgentAssistPromptUrl: !Ref DemoAgentAssistPromptUrl

# =============================================================================
# OUTPUTS
# =============================================================================
Outputs:
  LogGroupName:
    Description: CloudWatch Log Group for AI Agents Custom Resource Lambda
    Value: !Ref AIAgentsLogGroup
    Export:
      Name: !Sub '${AWS::StackName}-LogGroupName'

  LogGroupArn:
    Description: ARN of the CloudWatch Log Group
    Value: !GetAtt AIAgentsLogGroup.Arn
    Export:
      Name: !Sub '${AWS::StackName}-LogGroupArn'

  CustomResourceRoleArn:
    Description: ARN of the IAM Role for AI Agents Custom Resource Lambda
    Value: !GetAtt AIAgentsCustomResourceRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-CustomResourceRoleArn'

  # AI Agent IDs from Custom Resource
  # Note: These outputs are populated by the Custom Resource Lambda
  # The values come from the Custom Resource's response Data attribute
  # Outputs are conditional based on IndustryMode

  DemoSelfServiceAgentId:
    Condition: DeployDemo
    Description: Banking Self-Service AI Agent ID
    Value: !GetAtt AIAgentsCustomResource.DemoSelfServiceAgentId
    Export:
      Name: !Sub '${AWS::StackName}-DemoSelfServiceAgentId'

  DemoAgentAssistAgentId:
    Condition: DeployDemo
    Description: Banking Agent-Assist AI Agent ID
    Value: !GetAtt AIAgentsCustomResource.DemoAgentAssistAgentId
    Export:
      Name: !Sub '${AWS::StackName}-DemoAgentAssistAgentId'

  # Security Profile for AI Agents
  SecurityProfileId:
    Description: ID of the Security Profile created for AI Agents
    Value: !Select [3, !Split ['/', !GetAtt AIAgentsSecurityProfile.SecurityProfileArn]]
    Export:
      Name: !Sub '${AWS::StackName}-SecurityProfileId'

  SecurityProfileArn:
    Description: ARN of the Security Profile created for AI Agents
    Value: !GetAtt AIAgentsSecurityProfile.SecurityProfileArn
    Export:
      Name: !Sub '${AWS::StackName}-SecurityProfileArn'
