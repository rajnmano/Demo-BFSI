AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  AgentCore Gateway Setup for AI Agents Workshop.
  Creates Gateway, Credential Providers, and Gateway Targets with placeholder inline OpenAPI specs.
  Participants update targets with S3-based OpenAPI specs to enable full functionality.

Parameters:
  IndustryMode:
    Type: String
    Description: Which industry APIs to create Gateway Targets for
    Default: demo

  SharedApiKeyValue1:
    Type: String
    Description: Primary API key for industry APIs (hotel, billing, facilities, public-sector, healthcare, telecom, utilities, insurance, automotive)
    NoEcho: true
    MinLength: 20
    AllowedPattern: '^[a-zA-Z0-9]+'

  AgentCoreGatewayDiscoveryUrl:
    Type: String
    Description: Connect instance discovery URL (https://{instance}.my.connect.aws/.well-known/openid-configuration)
    AllowedPattern: '^https://[a-zA-Z0-9-]+\.my\.connect\.aws/\.well-known/openid-configuration$'

  SharedApiKeyValue2:
    Type: String
    Description: Secondary API key for retail and manufacturing (optional)
    NoEcho: true
    Default: ''
    AllowedPattern: '^[a-zA-Z0-9]*$'

  Boto3LayerArn:
    Type: String
    Description: Lambda layer ARN with boto3 AgentCore support (optional)
    Default: ''
    AllowedPattern: '^(arn:aws:lambda:[a-z0-9-]+:[0-9]+:layer:[a-zA-Z0-9-_]+:[0-9]+)?$'
Conditions:
  HasBoto3Layer: !Not [!Equals [!Ref Boto3LayerArn, '']]
Resources:
  GatewayExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      # Note: RoleName omitted to allow CloudFormation auto-generation
      # This avoids 64-char limit issues with nested stack names
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock-agentcore.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: GatewayPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [s3:GetObject]
                Resource: '*'
              - Effect: Allow
                Action: [bedrock-agentcore:InvokeGateway]
                Resource: '*'
              - Effect: Allow
                Action: [bedrock-agentcore:GetWorkloadAccessToken]
                Resource:
                  - !Sub 'arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:workload-identity-directory/default'
                  - !Sub 'arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:workload-identity-directory/default/workload-identity/*'
              - Effect: Allow
                Action: [bedrock-agentcore:GetResourceApiKey]
                Resource:
                  - !Sub 'arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:token-vault/*'
                  - !Sub 'arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:workload-identity-directory/default'
                  - !Sub 'arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:workload-identity-directory/default/workload-identity/*'
              - Effect: Allow
                Action: [secretsmanager:GetSecretValue]
                Resource: '*'

  CustomResourceRole:
    Type: AWS::IAM::Role
    Properties:
      # Note: RoleName omitted to allow CloudFormation auto-generation
      # This avoids 64-char limit issues with nested stack names
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: AgentCorePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [bedrock-agentcore:*]
                Resource: '*'
              - Effect: Allow
                Action: [secretsmanager:CreateSecret, secretsmanager:DeleteSecret, secretsmanager:GetSecretValue, secretsmanager:PutSecretValue, secretsmanager:UpdateSecret, secretsmanager:TagResource]
                Resource: '*'
              - Effect: Allow
                Action: [iam:PassRole]
                Resource: !GetAtt GatewayExecutionRole.Arn
                Condition:
                  StringEquals:
                    iam:PassedToService: bedrock-agentcore.amazonaws.com

  CustomResourceLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      # Note: LogGroupName omitted - will be auto-created when Lambda runs
      # This avoids 64-char limit issues with nested stack names
      RetentionInDays: 7

  AgentCoreFn:
    Type: AWS::Lambda::Function
    # Note: Removed DependsOn for LogGroup since we're using auto-generated names
    Properties:
      # Note: FunctionName omitted to allow CloudFormation auto-generation
      # This avoids 64-char limit issues with nested stack names
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt CustomResourceRole.Arn
      Timeout: 900
      MemorySize: 256
      Layers: !If [HasBoto3Layer, [!Ref Boto3LayerArn], !Ref 'AWS::NoValue']
      Code:
        ZipFile: |
          import json, logging, os, time, urllib.request, hashlib
          import boto3
          from botocore.exceptions import ClientError
          
          logger = logging.getLogger()
          logger.setLevel(os.environ.get('LOG_LEVEL', 'INFO'))
          
          PRIMARY = ['demo']
          SECONDARY = ['demo']
          ALL = PRIMARY
          
          def unique_suffix(stack, key):
              """Generate a short unique suffix based on stack name and key to avoid naming collisions"""
              h = hashlib.md5(f"{stack}-{key[:8]}".encode()).hexdigest()[:8]
              return h
          
          SPECS = {
              'demo': {'title': 'Banking System API', 'ops': ['getTransactions', 'getInvoices', 'getDisputes']},
          }
          
          def gen_spec(ind):
              s = SPECS.get(ind, {'title': f'{ind} API', 'ops': ['healthCheck']})
              paths = {f'/{op}': {'get': {'operationId': op, 'summary': op, 'security': [{'ApiKeyAuth': []}], 'responses': {'200': {'description': 'OK'}}}} for op in s['ops']}
              return {'openapi': '3.0.1', 'info': {'title': s['title'], 'description': 'PLACEHOLDER - Update with S3 spec', 'version': '1.0.0'},
                      'servers': [{'url': 'https://placeholder.example.com'}], 'paths': paths,
                      'components': {'securitySchemes': {'ApiKeyAuth': {'type': 'apiKey', 'in': 'header', 'name': 'X-API-Key'}}}}
          
          def wait(client, gw_id, res_type, target_id=None):
              # Reduced polling: 30 iterations × 2 seconds = 60 seconds max per resource
              for i in range(30):
                  try:
                      if res_type == 'gateway':
                          r = client.get_gateway(gatewayIdentifier=gw_id)
                          status = r.get('status')
                          if i == 0 or i == 29:
                              logger.info(f"Gateway {gw_id} status: {status}")
                          # API returns READY when active (not ACTIVE)
                          if status == 'READY': return True
                      else:
                          # API uses targetId, not targetIdentifier
                          r = client.get_gateway_target(gatewayIdentifier=gw_id, targetId=target_id)
                          status = r.get('status')
                          if i == 0 or i == 29:
                              logger.info(f"Target {target_id} status: {status}")
                          # API returns READY when active (not ACTIVE)
                          if status == 'READY': return True
                  except Exception as e:
                      if i == 0:
                          logger.warning(f"Error checking {res_type} status: {e}")
                  time.sleep(2)
              logger.warning(f"Resource {res_type} {target_id or gw_id} did not reach READY in time, continuing anyway")
              return False
          
          def handler(event, context):
              logger.info(f"Event: {json.dumps(event, default=str)}")
              rt = event.get('RequestType')
              props = event.get('ResourceProperties', {})
              try:
                  if rt == 'Create': res = handle_create(props)
                  elif rt == 'Update': res = handle_update(event, props)
                  elif rt == 'Delete': res = handle_delete(event)
                  else: raise ValueError(f"Unknown: {rt}")
                  send(event, context, 'SUCCESS', res)
              except Exception as e:
                  logger.error(f"Error: {e}", exc_info=True)
                  send(event, context, 'FAILED', reason=str(e))
          
          def handle_create(props):
              client = boto3.client('bedrock-agentcore-control')
              stack = props.get('StackName', '')
              mode = props.get('IndustryMode', 'all')
              key1 = props.get('SharedApiKeyValue1', '')
              key2 = props.get('SharedApiKeyValue2', '')
              disc = props.get('DiscoveryUrl', '')
              role = props.get('RoleArn') or props.get('roleArn') or props.get('Role') or props.get('role') or ''
              logger.info(f"Props received: StackName={stack}, IndustryMode={mode}, DiscoveryUrl={disc[:50]}..., RoleArn={role[:50]}...")
              if not role:
                  raise ValueError(f"RoleArn is required but was empty or missing")
              industries = ALL if mode == 'all' else [mode] if mode in ALL else []
              # Gateway name max 48 chars - use short prefix + hash of stack name
              stack_hash = hashlib.md5(stack.encode()).hexdigest()[:12]
              gw_name = f'workshop-gw-{stack_hash}'
              
              # Check if this is a retry - if gateway already exists with ALL targets, return existing state immediately
              # This handles the case where a previous Lambda invocation completed but timed out before responding
              try:
                  for g in client.list_gateways().get('gateways', []):
                      if g.get('name') == gw_name:
                          gw_id = g.get('gatewayId')
                          logger.info(f"Gateway {gw_name} already exists (id={gw_id}), checking target count")
                          existing_targets = client.list_gateway_targets(gatewayIdentifier=gw_id).get('targets', [])
                          logger.info(f"Found {len(existing_targets)} existing targets, need {len(industries)}")
                          if len(existing_targets) >= len(industries):
                              logger.info(f"All targets exist, returning existing state (likely retry after timeout)")
                              # Reconstruct the response from existing resources
                              targets = {}
                              for t in existing_targets:
                                  # Extract industry from target name (e.g., "Demo-API-Target" -> "Demo")
                                  tname = t.get('name', '')
                                  for ind in ALL:
                                      if ind.title().replace("-", "") in tname:
                                          targets[f'{ind.replace("-", "")}TargetId'] = t.get('targetId')
                                          break
                              # Find credential providers
                              cp1, cp2 = '', ''
                              for cp in client.list_api_key_credential_providers().get('credentialProviders', []):
                                  cpname = cp.get('name', '')
                                  if stack in cpname:
                                      if 'Pri' in cpname: cp1 = cp.get('credentialProviderArn') or cp.get('arn')
                                      elif 'Sec' in cpname: cp2 = cp.get('credentialProviderArn') or cp.get('arn')
                              return {'GatewayArn': g.get('gatewayArn'), 'GatewayId': gw_id, 'GatewayUrl': g.get('gatewayUrl', ''),
                                      'PrimaryCredentialProviderArn': cp1, 'SecondaryCredentialProviderArn': cp2, **targets}
                          else:
                              # Gateway exists but not all targets - this is a partial completion
                              # Continue with creation, the idempotent functions will skip existing resources
                              logger.info(f"Gateway exists with partial targets, continuing to create remaining")
                          break
              except Exception as e:
                  logger.warning(f"Error checking for existing resources: {e}")
              
              # Create credential providers with unique suffix to avoid naming collisions
              suffix1 = unique_suffix(stack, key1)
              cp1 = create_cred(client, f'{stack}-ApiKey-Pri-{suffix1}', key1)
              cp2 = None
              if key2:
                  suffix2 = unique_suffix(stack, key2)
                  cp2 = create_cred(client, f'{stack}-ApiKey-Sec-{suffix2}', key2)
              
              # Create gateway
              logger.info(f"Creating gateway with name={gw_name}")
              gw = create_gw(client, gw_name, disc, role)
              wait(client, gw['id'], 'gateway')
              
              # Create ALL targets first without waiting (parallel creation)
              targets = {}
              target_ids = []
              for ind in industries:
                  cp = cp2 if ind in SECONDARY and cp2 else cp1
                  tid = create_target(client, gw['id'], f'{ind.title().replace("-", "")}-API-Target', ind, cp)
                  targets[f'{ind.replace("-", "")}TargetId'] = tid
                  target_ids.append(tid)
                  logger.info(f"Created target {ind} with id={tid}, continuing without wait")
              
              # Now wait for all targets to become ACTIVE (they create in parallel on AWS side)
              logger.info(f"All {len(target_ids)} targets created, waiting for ACTIVE status")
              for tid in target_ids:
                  wait(client, gw['id'], 'target', tid)
              
              return {'GatewayArn': gw['arn'], 'GatewayId': gw['id'], 'GatewayUrl': gw['url'],
                      'PrimaryCredentialProviderArn': cp1, 'SecondaryCredentialProviderArn': cp2 or '', **targets}
          
          def handle_update(event, props):
              handle_delete(event)
              return handle_create(props)
          
          def handle_delete(event):
              client = boto3.client('bedrock-agentcore-control')
              phys = event.get('PhysicalResourceId', '')
              if not phys or phys == 'NONE': return {}
              # PhysicalResourceId is now just the gateway ID (not JSON)
              gw_id = phys
              try:
                  # Try to delete targets and gateway
                  for t in client.list_gateway_targets(gatewayIdentifier=gw_id).get('targets', []):
                      try: client.delete_gateway_target(gatewayIdentifier=gw_id, targetId=t.get('targetId'))
                      except: pass
                  try: client.delete_gateway(gatewayIdentifier=gw_id)
                  except: pass
                  # Also try to clean up credential providers by listing and matching stack name pattern
                  # This is best-effort since we don't have the exact names stored
              except Exception as e:
                  logger.warning(f"Error during delete (may be expected if resources don't exist): {e}")
              return {}
          
          def create_cred(client, name, key):
              # First check if credential provider already exists (idempotency for retries)
              try:
                  resp = client.list_api_key_credential_providers()
                  for cp in resp.get('credentialProviders', []):
                      if cp.get('name') == name:
                          arn = cp.get('credentialProviderArn') or cp.get('arn')
                          logger.info(f"Credential provider {name} already exists with arn={arn}, reusing")
                          return arn
              except Exception as le:
                  logger.warning(f"Could not list credential providers: {le}")
              
              # Credential provider doesn't exist, create it
              try:
                  logger.info(f"Creating new credential provider with name={name}")
                  r = client.create_api_key_credential_provider(name=name, apiKey=key)
                  return r.get('credentialProviderArn') or r.get('arn')
              except ClientError as e:
                  err_code = e.response['Error']['Code']
                  # Handle race condition - created between our check and create
                  if err_code in ['ConflictException', 'ValidationException'] and 'already exists' in str(e):
                      logger.info(f"Credential provider {name} created by concurrent request, searching in list")
                      resp = client.list_api_key_credential_providers()
                      for cp in resp.get('credentialProviders', []):
                          if cp.get('name') == name:
                              return cp.get('credentialProviderArn') or cp.get('arn')
                      raise ValueError(f"Credential provider {name} exists but could not retrieve ARN")
                  raise
          
          def create_gw(client, name, disc, role):
              logger.info(f"create_gw called: name={name}, disc={disc}, role={role}")
              
              # Helper to find gateway by name with retry
              def find_gateway(retries=3):
                  for attempt in range(retries):
                      try:
                          for g in client.list_gateways().get('gateways', []):
                              if g.get('name') == name:
                                  return g
                      except Exception as le:
                          logger.warning(f"list_gateways attempt {attempt+1} failed: {le}")
                          if attempt < retries - 1:
                              time.sleep(2)
                  return None
              
              # Helper to delete a gateway and its targets
              def delete_gateway(gw_id):
                  logger.info(f"Deleting gateway {gw_id} and its targets")
                  try:
                      for t in client.list_gateway_targets(gatewayIdentifier=gw_id).get('targets', []):
                          try: client.delete_gateway_target(gatewayIdentifier=gw_id, targetId=t.get('targetId'))
                          except: pass
                      client.delete_gateway(gatewayIdentifier=gw_id)
                      # Wait for deletion to complete
                      for _ in range(30):
                          time.sleep(2)
                          if not find_gateway(): break
                  except Exception as de:
                      logger.warning(f"Error deleting gateway: {de}")
              
              # First check if gateway already exists (idempotency for retries)
              existing = find_gateway()
              if existing:
                  gw_id = existing.get('gatewayId')
                  gw_status = existing.get('status', '')
                  logger.info(f"Gateway {name} already exists with id={gw_id}, status={gw_status}")
                  
                  # If gateway is in FAILED state, delete it and recreate
                  if gw_status in ['FAILED', 'DELETE_FAILED']:
                      logger.info(f"Gateway is in {gw_status} state, deleting and recreating")
                      delete_gateway(gw_id)
                      existing = None  # Force creation of new gateway
                  elif gw_status == 'READY':
                      # Gateway is healthy, try to update it
                      try:
                          client.update_gateway(gatewayIdentifier=gw_id, name=name, protocolType='MCP', authorizerType='CUSTOM_JWT',
                              roleArn=role, authorizerConfiguration={'customJWTAuthorizer': {'discoveryUrl': disc, 'allowedAudience': [gw_id]}})
                      except Exception as ue:
                          logger.warning(f"Could not update existing gateway: {ue}")
                      return {'arn': existing.get('gatewayArn'), 'id': gw_id, 'url': existing.get('gatewayUrl', '')}
                  elif gw_status in ['CREATING', 'UPDATING']:
                      # Gateway is being created/updated, wait for it
                      logger.info(f"Gateway is in {gw_status} state, waiting for READY")
                      wait(client, gw_id, 'gateway')
                      return {'arn': existing.get('gatewayArn'), 'id': gw_id, 'url': existing.get('gatewayUrl', '')}
                  else:
                      # Unknown status, try to use it anyway
                      logger.warning(f"Gateway has unknown status {gw_status}, attempting to use")
                      return {'arn': existing.get('gatewayArn'), 'id': gw_id, 'url': existing.get('gatewayUrl', '')}
              
              # Gateway doesn't exist, create it
              try:
                  logger.info(f"Creating new gateway with name={name}")
                  r = client.create_gateway(name=name, protocolType='MCP', authorizerType='CUSTOM_JWT',
                      roleArn=role, authorizerConfiguration={'customJWTAuthorizer': {'discoveryUrl': disc, 'allowedAudience': ['placeholder']}})
                  gw_id = r.get('gatewayId') or r.get('id')
                  logger.info(f"Gateway created with id={gw_id}, waiting for ACTIVE status")
                  wait(client, gw_id, 'gateway')
                  # Update gateway with correct audience (gateway ID)
                  logger.info(f"Updating gateway audience to {gw_id}")
                  client.update_gateway(gatewayIdentifier=gw_id, name=name, protocolType='MCP', authorizerType='CUSTOM_JWT',
                      roleArn=role, authorizerConfiguration={'customJWTAuthorizer': {'discoveryUrl': disc, 'allowedAudience': [gw_id]}})
                  return {'arn': r.get('gatewayArn') or r.get('arn'), 'id': gw_id, 'url': r.get('gatewayUrl') or r.get('url', '')}
              except ClientError as e:
                  err_code = e.response['Error']['Code']
                  err_msg = str(e)
                  # Handle race condition - gateway created by concurrent Lambda invocation
                  if err_code == 'ConflictException' or (err_code == 'ValidationException' and 'already exists' in err_msg):
                      logger.info(f"Gateway {name} was created by concurrent request, retrieving it")
                      time.sleep(2)  # Brief pause to let the other invocation finish
                      existing = find_gateway()
                      if existing:
                          gw_id = existing.get('gatewayId')
                          # Wait for it to become ACTIVE (the other invocation may still be setting it up)
                          wait(client, gw_id, 'gateway')
                          return {'arn': existing.get('gatewayArn'), 'id': gw_id, 'url': existing.get('gatewayUrl', '')}
                      raise ValueError(f"Gateway {name} exists but could not retrieve it after conflict")
                  raise
          
          def create_target(client, gw_id, name, ind, cred):
              # First check if target already exists (idempotency for retries)
              try:
                  for t in client.list_gateway_targets(gatewayIdentifier=gw_id).get('targets', []):
                      if t.get('name') == name:
                          tid = t.get('targetId')
                          logger.info(f"Target {name} already exists with id={tid}, reusing")
                          return tid
              except Exception as le:
                  logger.warning(f"Could not list targets: {le}")
              
              # Target doesn't exist, create it
              spec = gen_spec(ind)
              try:
                  logger.info(f"Creating new target {name} for industry {ind}")
                  r = client.create_gateway_target(gatewayIdentifier=gw_id, name=name,
                      targetConfiguration={'mcp': {'openApiSchema': {'inlinePayload': json.dumps(spec)}}},
                      credentialProviderConfigurations=[{'credentialProviderType': 'API_KEY',
                          'credentialProvider': {'apiKeyCredentialProvider': {'providerArn': cred, 'credentialLocation': 'HEADER', 'credentialParameterName': 'X-API-Key'}}}])
                  return r.get('targetId') or r.get('id')
              except ClientError as e:
                  if e.response['Error']['Code'] == 'ConflictException':
                      logger.info(f"ConflictException on create target, may have been created by concurrent request")
                      for t in client.list_gateway_targets(gatewayIdentifier=gw_id).get('targets', []):
                          if t.get('name') == name: return t.get('targetId')
                  raise
          
          def send(event, context, status, data=None, reason=None):
              # PhysicalResourceId must be a simple string, not JSON - use gateway ID or stack name
              phys_id = data.get('GatewayId', event.get('PhysicalResourceId', context.log_stream_name)) if data else event.get('PhysicalResourceId', context.log_stream_name)
              body = {'Status': status, 'Reason': reason or f"See CloudWatch: {context.log_stream_name}",
                      'PhysicalResourceId': phys_id,
                      'StackId': event['StackId'], 'RequestId': event['RequestId'], 'LogicalResourceId': event['LogicalResourceId']}
              if data: body['Data'] = data
              req = urllib.request.Request(event['ResponseURL'], data=json.dumps(body).encode(), headers={'Content-Type': ''}, method='PUT')
              urllib.request.urlopen(req)

  AgentCoreGatewayResource:
    Type: Custom::AgentCoreGateway
    DependsOn:
      - GatewayExecutionRole
      - CustomResourceLogGroup
    Properties:
      ServiceToken: !GetAtt AgentCoreFn.Arn
      StackName: !Ref 'AWS::StackName'
      IndustryMode: !Ref IndustryMode
      SharedApiKeyValue1: !Ref SharedApiKeyValue1
      SharedApiKeyValue2: !Ref SharedApiKeyValue2
      DiscoveryUrl: !Ref AgentCoreGatewayDiscoveryUrl
      RoleArn: !GetAtt GatewayExecutionRole.Arn

Outputs:
  GatewayArn:
    Description: ARN of the AgentCore Gateway
    Value: !GetAtt AgentCoreGatewayResource.GatewayArn
    Export:
      Name: !Sub '${AWS::StackName}-GatewayArn'

  GatewayId:
    Description: ID of the AgentCore Gateway
    Value: !GetAtt AgentCoreGatewayResource.GatewayId
    Export:
      Name: !Sub '${AWS::StackName}-GatewayId'

  GatewayEndpointUrl:
    Description: MCP endpoint URL for the Gateway
    Value: !GetAtt AgentCoreGatewayResource.GatewayUrl
    Export:
      Name: !Sub '${AWS::StackName}-GatewayUrl'

  PrimaryCredentialProviderArn:
    Description: ARN of the primary API Key Credential Provider
    Value: !GetAtt AgentCoreGatewayResource.PrimaryCredentialProviderArn
    Export:
      Name: !Sub '${AWS::StackName}-PrimaryCredentialArn'

  SecondaryCredentialProviderArn:
    Description: ARN of the secondary API Key Credential Provider
    Value: !GetAtt AgentCoreGatewayResource.SecondaryCredentialProviderArn
    Export:
      Name: !Sub '${AWS::StackName}-SecondaryCredentialArn'

  BankingTargetId:
    Description: Gateway Target ID for Banking API
    Value: !GetAtt AgentCoreGatewayResource.demoTargetId


  UpdateInstructions:
    Description: Instructions for updating Gateway Targets with S3-based OpenAPI specs
    Value: |
      Gateway Targets are created with placeholder inline OpenAPI specs.
      To enable full functionality, update each target in the AgentCore Gateway console:
      1. Navigate to Amazon Bedrock > AgentCore > Gateways
      2. Select the gateway and click on each target
      3. Change OpenAPI Schema from 'Inline' to 'S3 resource'
      4. Enter the S3 URI from the industry API stack outputs (e.g., s3://bucket/hotel/hotel-api-openapi.yaml)
      5. Save the target configuration
