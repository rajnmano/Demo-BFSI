        - InstanceId: !Select [1, !Split ['/', !Ref ConnectInstanceArn]]
          AgentScreenPopViewId:
            !Select [3, !Split ['/', !Ref AgentScreenPopView]]
      Description: Agent Screen Pop contact flow for human escalation workshop
  
  # Inbound Contact Flow
  InboundContactFlow:
