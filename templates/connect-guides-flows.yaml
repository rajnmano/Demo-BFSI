AWSTemplateFormatVersion: '2010-09-09'
Description:
  Amazon Connect Agent Screen Pop View and Contact Flow for Workshop

Parameters:
  ConnectInstanceArn:
    Type: String
    Description: ARN of the Amazon Connect instance
  AiAssistantARN:
    Type: String
    Description: ARN of the AI assistant to be used in the contact flow
  ProfileId:
    Type: String
    Description: Profile ID to be used in the contact flow
  LambdaFunctionArn:
    Type: String
    Description: ARN of the Lambda function to be used in the contact flow
  DemoAgentAssistAgentId:
    Type: String
    Description: AI Agent ID for the Agent Assist agent
  DemoSelfServiceAgentId:
    Type: String
    Description: AI Agent ID for the Self-Service agent
  QueueId:
    Type: String
    Description: Queue ID to be used in the contact flow

Resources:
  # Agent Screen Pop View
  AgentScreenPopView:
    UpdateReplacePolicy: Retain
    DeletionPolicy: Retain
    Type: AWS::Connect::View
    Properties:
      InstanceArn: !Ref ConnectInstanceArn
      Name: !Sub '${AWS::StackName}-Agent Screen Pop'
      Template:
        {
          'Head':
            {
              'Configuration': { 'Layout': { 'Columns': ['3', '9'] } },
              'Integrations': [],
              'Title': 'Agent Screen Pop',
            },
          'Body':
            [
              {
                '_id': 'Container_1764185708801',
                'Type': 'Container',
                'Props': { 'Visibility': 'true', 'HideBorder': 'false' },
                'Content':
                  [
                    {
                      '_id': 'Image_1764185747054',
                      'Type': 'Image',
                      'Props':
                        {
                          'Alt': 'An image of the current customer',
                          'Src': '$.Image_1764185747054.Src',
                        },
                      'Content': [],
                      'Configuration': { 'Style': { '--img-width': '70%' } },
                    },
                    {
                      '_id': 'TextBox_1764185812604',
                      'Type': 'TextBox',
                      'Props':
                        {
                          'Variant': 'div',
                          'FontWeight': 'bold',
                          'FontSize': 'heading-m',
                          'TextAlign': 'left',
                        },
                      'Content': ['Customer Details'],
                    },
                    {
                      '_id': 'AttributeSection_1764185860582',
                      'Type': 'AttributeSection',
                      'Props':
                        {
                          'Columns': '',
                          'Items':
                            [
                              {
                                'Label': 'Customer Name',
                                'Value':
                                  '$.AttributeSection_1764185860582.Items[0].Value',
                              },
                              {
                                'Label': 'Customer ID',
                                'Value':
                                  '$.AttributeSection_1764185860582.Items[1].Value',
                              },
                            ],
                        },
                      'Content': [],
                      'Configuration': { 'Layout': { 'Columns': '12' } },
                    },
                    {
                      '_id': 'ButtonGroup_1764186070952',
                      'Type': 'ButtonGroup',
                      'Props':
                        {
                          'SpaceBetweenButtons': 's',
                          'Items':
                            [
                              {
                                'Variant': 'primary',
                                'Label': 'Profile',
                                'Action': 'ActionSelected',
                                'IconAlign': 'left',
                                'Disabled': 'false',
                                'IconName': 'user-profile',
                              },
                              {
                                'Label': 'Unlock',
                                'FormAction': 'submit',
                                'Action': 'ActionSelected',
                                'IconName': 'unlocked',
                              },
                            ],
                          'ButtonsOrientation': 'vertical',
                        },
                      'Content': [],
                    },
                  ],
                'Configuration': { 'Layout': { 'Columns': '12' } },
              },
              {
                '_id': 'Container_1764185712000',
                'Type': 'Container',
                'Props': { 'Visibility': 'true', 'HideBorder': 'false' },
                'Content':
                  [
                    {
                      '_id': 'EscalationReason',
                      'Type': 'Alert',
                      'Props':
                        {
                          'dismissible': 'false',
                          'type': 'info',
                          'level': 'page',
                          'heading': 'Escalation Reason',
                        },
                      'Content': ['$.EscalationReason.Content'],
                    },
                    {
                      '_id': 'CustomerAttributes',
                      'Type': 'AttributeBar',
                      'Props':
                        {
                          'Attributes':
                            [
                              {
                                'Label': 'Customer Intent',
                                'Value': '$.CustomerAttributes.Attributes[0].Value',
                              },
                              {
                                'Label': 'Customer Sentiment',
                                'Value': '$.CustomerAttributes.Attributes[1].Value',
                              },
                            ],
                        },
                      'Content': [],
                    },
                    {
                      '_id': 'EscalationSummary',
                      'Type': 'TextArea',
                      'Props':
                        {
                          'DefaultValue': '$.EscalationSummary.DefaultValue',
                          'HelperText':
                            'This is the summary generated by the AI agent',
                          'Required': 'false',
                          'Label': 'Escalation Summary',
                          'MaxLength': '2000',
                          'Disabled': 'false',
                          'Name': 'escalationSummary',
                        },
                      'Content': [],
                    },
                  ],
                'Configuration': { 'Layout': { 'Columns': '12' } },
              },
            ],
        }
      Actions:
        - ActionSelected
      Description: Agent Screen Pop view for human escalation workshop

  # Agent Screen Pop Contact Flow
  AgentScreenPopContactFlow:
    Type: AWS::Connect::ContactFlow
    DependsOn:
      - AgentScreenPopView
    Properties:
      InstanceArn: !Ref ConnectInstanceArn
      Name: !Sub '${AWS::StackName}-Agent Screen Pop'
      Type: CONTACT_FLOW
      Content: !Sub
