        - InstanceId: !Select [1, !Split ['/', !Ref ConnectInstanceArn]]
          AgentScreenPopContactFlowARN: !GetAtt AgentScreenPopContactFlow.ContactFlowArn
          ProfileId: !Ref ProfileId
          AIAssistantArn: !Ref AiAssistantARN 
          LambdaFunctionArn: !Ref LambdaFunctionArn
          DemoAgentAssistAgentId: !Ref DemoAgentAssistAgentId
          DemoSelfServiceAgentId: !Ref DemoSelfServiceAgentId
          QueueId: !Ref QueueId
          AiAgentId: !Select [1, !Split ['/', !Ref AiAssistantARN]]
      Description: Inbound contact flow for human escalation workshop

Outputs:
  AgentScreenPopViewArn:
    Description: ARN for Agent Screen Pop view
    Value: !GetAtt AgentScreenPopView.ViewArn
    Export:
      Name: !Sub '${AWS::StackName}-agent-screen-pop-view-arn'

  AgentScreenPopViewId:
    Description: ID for Agent Screen Pop view
    Value: !Select [3, !Split ['/', !Ref AgentScreenPopView]]
    Export:
      Name: AgentScreenPopViewId

  AgentScreenPopContactFlowArn:
    Description: ARN for Agent Screen Pop contact flow
    Value: !GetAtt AgentScreenPopContactFlow.ContactFlowArn
    Export:
      Name: !Sub '${AWS::StackName}-agent-screen-pop-flow-arn'

  AgentScreenPopContactFlowId:
    Description: ID for Agent Screen Pop contact flow
    Value: !Ref AgentScreenPopContactFlow
    Export:
      Name: AgentScreenPopContactFlowId
  
  InboundContactFlowArn:
    Description: ARN for Inbound contact flow
    Value: !GetAtt InboundContactFlow.ContactFlowArn
    Export:
      Name: !Sub '${AWS::StackName}-inbound-flow-arn'

  InboundContactFlowId:
    Description: ID for Inbound contact flow
    Value: !Ref InboundContactFlow
    Export:
      Name: InboundContactFlowId
